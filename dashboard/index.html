<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Org Brain - Organization Command Center for GitHub repositories">
    <meta name="theme-color" content="#0d1117">
    <title>Org Brain - Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧠</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- HEADER -->
        <header class="dashboard-header">
            <div class="header-content">
                <div class="header-brand">
                    <div class="header-logo">🧠</div>
                    <div class="header-title">
                        <h1 id="dashboard-title">Org Brain</h1>
                        <div class="org-name">
                            <span id="org-name">Organization</span>
                        </div>
                        <div class="header-subtitle" id="dashboard-subtitle">
                            Organization Command Center
                        </div>
                    </div>
                </div>

                <div class="header-actions">
                    <button id="install-token-btn" class="refresh-btn" title="Install automation token to all repos">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                        Token
                    </button>
                    <button id="failures-panel-btn" class="refresh-btn" title="View workflow failures">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <line x1="12" y1="8" x2="12" y2="12"></line>
                            <line x1="12" y1="16" x2="12.01" y2="16"></line>
                        </svg>
                        Failures
                    </button>
                    <button id="bulk-actions-btn" class="refresh-btn" title="Toggle bulk actions mode">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 11 12 14 22 4"></polyline>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        Bulk
                    </button>
                    <button id="refresh-btn" class="refresh-btn" title="Refresh data">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="23 4 23 10 17 10"></polyline>
                            <polyline points="1 20 1 14 7 14"></polyline>
                            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                        </svg>
                        Refresh
                    </button>
                    <span id="last-updated" class="last-updated"></span>
                </div>
            </div>
        </header>

        <!-- MAIN CONTENT -->
        <main class="dashboard-main" id="main-content">
            <!-- Loading Indicator -->
            <div id="loading-indicator" class="loading-container">
                <div class="spinner"></div>
                <div class="loading-text">Loading repositories...</div>
            </div>

            <!-- Error Container -->
            <div id="error-container" class="error-container"></div>

            <!-- Statistics Cards -->
            <section class="stats-container" aria-label="Repository Statistics">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">Total Repos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-active">0</div>
                    <div class="stat-label">Active</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-healthy">0</div>
                    <div class="stat-label">Healthy</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-stars">0</div>
                    <div class="stat-label">Total Stars</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-forks">0</div>
                    <div class="stat-label">Total Forks</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-failures">0</div>
                    <div class="stat-label">Failures</div>
                </div>
            </section>

            <!-- Filters -->
            <section class="filters-container" aria-label="Filters">
                <div class="search-box">
                    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    <input
                        type="text"
                        id="search-input"
                        placeholder="Search repositories..."
                        autocomplete="off"
                        aria-label="Search repositories"
                    >
                </div>

                <div class="filter-group">
                    <label for="language-filter">Language:</label>
                    <select id="language-filter" aria-label="Filter by language">
                        <option value="all">All Languages</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="health-filter">Health:</label>
                    <select id="health-filter" aria-label="Filter by health status">
                        <option value="all">All Status</option>
                        <option value="healthy">Healthy</option>
                        <option value="warning">Warning</option>
                        <option value="unhealthy">Unhealthy</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>

                <div class="sort-controls">
                    <label for="sort-select">Sort:</label>
                    <select id="sort-select" aria-label="Sort repositories">
                        <option value="health-desc">Health (High-Low)</option>
                        <option value="health-asc">Health (Low-High)</option>
                        <option value="name-asc">Name (A-Z)</option>
                        <option value="name-desc">Name (Z-A)</option>
                        <option value="stars-desc">Stars (High-Low)</option>
                        <option value="stars-asc">Stars (Low-High)</option>
                        <option value="forks-desc">Forks (High-Low)</option>
                        <option value="forks-asc">Forks (Low-High)</option>
                        <option value="issues-desc">Issues (Most)</option>
                        <option value="issues-asc">Issues (Least)</option>
                        <option value="updated-desc">Recently Updated</option>
                        <option value="updated-asc">Least Recently Updated</option>
                    </select>
                </div>

                <div class="toggle-group">
                    <label class="toggle-switch">
                        <input type="checkbox" id="archived-toggle" aria-label="Show archived repositories">
                        <span class="toggle-slider"></span>
                    </label>
                    <label for="archived-toggle">Show Archived</label>
                </div>
            </section>

            <!-- Repository Grid -->
            <section aria-label="Repositories">
                <div id="repo-grid" class="repo-grid">
                    <!-- Repository cards will be inserted here by JavaScript -->
                </div>
            </section>

            <!-- Pagination -->
            <nav class="pagination-container" aria-label="Pagination">
                <div class="page-info">
                    <span id="page-info">Showing 0 of 0</span>
                </div>
                <div class="pagination-controls">
                    <select id="page-size-select" class="page-size-select" aria-label="Items per page"></select>
                    <div id="pagination" class="pagination">
                        <!-- Pagination buttons will be inserted here by JavaScript -->
                    </div>
                </div>
            </nav>
        </main>

        <!-- BULK ACTIONS BAR -->
        <div id="bulk-actions-bar" class="bulk-actions-bar">
            <!-- Content rendered by JavaScript -->
        </div>

        <!-- FAILURES PANEL -->
        <div id="failures-panel">
            <div class="failures-panel-header">
                <h3>Workflow Failures</h3>
                <button class="modal-close" onclick="toggleFailuresPanel()">&times;</button>
            </div>
            <div id="failures-panel-content">
                <!-- Content rendered by JavaScript -->
            </div>
        </div>

        <!-- FOOTER -->
        <footer class="dashboard-footer">
            <p id="footer-text">Powered by Org Brain</p>
            <p class="mt-1">
                <a href="https://github.com/940smiley/Org-Brain" target="_blank" rel="noopener">
                    View on GitHub
                </a>
            </p>
        </footer>
    </div>

    <!-- SCRIPTS -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
