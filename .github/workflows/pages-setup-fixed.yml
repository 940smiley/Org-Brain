name: "📄 Pages Auto-Setup"

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository name (leave empty for all)"
        required: false
        type: string
      template:
        description: "Template to deploy"
        required: false
        type: choice
        options:
          - documentation
          - portfolio
          - blog
          - project
      ai_customize:
        description: "Request AI customization"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

env:
  ORG_NAME: ${{ github.repository_owner }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  discover:
    name: "Discover Pages Candidates"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find repos without Pages
        id: discover
        run: |
          echo "🔍 Finding repos without Pages..."

          # Fetch all organization repositories
          repos_json=$(gh api "/orgs/$ORG_NAME/repos?per_page=100&type=public" \
            --jq '[.[] | select(.archived == false and .fork == false) | {name: .name}]')

          # Process each repo and filter those without Pages
          filtered_repos="[]"
          count=0

          while IFS= read -r repo_name; do
            # Check if Pages is enabled
            if ! gh api "/repos/$ORG_NAME/$repo_name/pages" 2>/dev/null | jq -e '.enabled' >/dev/null 2>&1; then
              # Add to array
              filtered_repos=$(echo "$filtered_repos" | jq --arg name "$repo_name" '. += [{"repo": $name}]')
              count=$((count + 1))
            fi
          done < <(echo "$repos_json" | jq -r '.[].name')

          echo "Found $count repositories without Pages enabled"

          # Output as JSON (properly escaped for GitHub Actions)
          echo "repos=$(echo "$filtered_repos" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          # Debug output
          echo "DEBUG: repos=$filtered_repos" >&2

  setup:
    name: "Setup Pages for ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.count > 0 }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover.outputs.repos) }}

    steps:
      - name: Validate repo name
        run: |
          echo "Processing repository: ${{ matrix.repo }}"
          if [[ ! "${{ matrix.repo }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid repository name: ${{ matrix.repo }}"
            exit 1
          fi
          echo "✓ Repository name validated"

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ env.GH_TOKEN }}
          fetch-depth: 1

      - name: Enable GitHub Pages
        run: |
          echo "📄 Enabling Pages for ${{ matrix.repo }}"

          REPO="${{ matrix.repo }}"
          ORG="${{ github.repository_owner }}"

          # Get default branch
          DEFAULT_BRANCH=$(gh api "/repos/$ORG/$REPO" --jq '.default_branch')
          echo "Default branch: $DEFAULT_BRANCH"

          # Get latest commit SHA
          LATEST_COMMIT=$(gh api "/repos/$ORG/$REPO/commits/$DEFAULT_BRANCH?per_page=1" --jq '.[0].sha // .sha')
          echo "Latest commit: $LATEST_COMMIT"

          # Create gh-pages branch if it doesn't exist
          if ! gh api "/repos/$ORG/$REPO/branches/gh-pages" >/dev/null 2>&1; then
            echo "Creating gh-pages branch..."
            gh api -X POST "/repos/$ORG/$REPO/git/refs" \
              -F ref='refs/heads/gh-pages' \
              -F sha="$LATEST_COMMIT" || echo "Branch may already exist"
          fi

          # Enable Pages
          echo "Configuring Pages settings..."
          gh api -X POST "/repos/$ORG/$REPO/pages" \
            -F source='{"branch":"gh-pages"}' 2>/dev/null || \
            echo "Pages may already be enabled"

          echo "✅ Pages enabled for $REPO"

      - name: Deploy Documentation Template
        run: |
          echo "📂 Deploying documentation template..."

          REPO="${{ matrix.repo }}"
          ORG="${{ github.repository_owner }}"

          # Create basic README content
          README_CONTENT="# $REPO

          This repository has GitHub Pages enabled.

          ## Getting Started

          - Repository: https://github.com/$ORG/$REPO
          - Pages Site: https://$ORG.github.io/$REPO/

          ## Documentation

          Add your documentation to the \`gh-pages\` branch.
          "

          # Encode content for API
          ENCODED_CONTENT=$(echo "$README_CONTENT" | base64 -w 0)

          # Create README on gh-pages branch
          gh api -X PUT "/repos/$ORG/$REPO/contents/README.md" \
            -F message='docs: initialize documentation' \
            -F content="$ENCODED_CONTENT" \
            -F branch='gh-pages' 2>/dev/null || \
            echo "README may already exist"

          echo "✅ Template deployed"

      - name: Create Summary
        run: |
          {
            echo "## Pages Setup Summary"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Repository | ${{ matrix.repo }} |"
            echo "| Pages URL | https://${{ github.repository_owner }}.github.io/${{ matrix.repo }}/ |"
            echo "| Status | ✅ Enabled |"
            echo "| Timestamp | $(date -u +'%Y-%m-%dT%H:%M:%SZ') |"
          } >> "$GITHUB_STEP_SUMMARY"

  summary:
    name: "Pages Setup Complete"
    runs-on: ubuntu-latest
    needs: setup
    if: always()
    steps:
      - name: Final Summary
        run: |
          echo "## ✅ Pages Auto-Setup Workflow Complete"
          echo ""
          echo "Successfully processed ${{ needs.discover.outputs.count }} repositories"
          echo ""
          echo "### Next Steps"
          echo "1. Visit your repositories to verify Pages is enabled"
          echo "2. Configure custom domains if needed"
          echo "3. Customize documentation on gh-pages branch"
