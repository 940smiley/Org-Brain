name: "📄 Pages Auto-Setup"

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      repo:
        description: "Repository name (leave empty for all matching)"
        required: false
        type: string
      template:
        description: "Template to deploy"
        required: false
        type: choice
        options:
          - documentation
          - portfolio
          - blog
          - project
        default: documentation
      ai_customize:
        description: "Request AI customization suggestions"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pages: write

env:
  OWNER: "940smiley"
  GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  discover-candidates:
    name: "Discover Pages Setup Candidates"
    runs-on: ubuntu-latest
    outputs:
      candidates: ${{ steps.discover.outputs.candidates }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq gh

      - name: Discover repositories without Pages
        id: discover
        run: |
          set -e
          echo "🔍 Discovering repositories without Pages enabled..."

          if [ -n "${{ github.event.inputs.repo }}" ]; then
            repos_json=$(gh api "/repos/$OWNER/${{ github.event.inputs.repo }}" | jq -c '[{name, language, topics, description}]')
          else
            repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=public" --paginate \
              | jq -c '[.[] | select(.archived == false and .fork == false) | {name, language, topics, description}]')
          fi

          candidates="[]"
          echo "$repos_json" | jq -c '.[]' | while read -r repo; do
            repo_name=$(echo "$repo" | jq -r '.name')
            pages_branch=$(gh api "/repos/$OWNER/$repo_name/pages" --jq '.source.branch // empty' 2>/dev/null || true)

            if [ -z "$pages_branch" ]; then
              echo "$repo"
            fi
          done | jq -sc '.' > /tmp/pages_candidates.json

          candidates=$(cat /tmp/pages_candidates.json 2>/dev/null || echo "[]")
          if [ -z "$candidates" ]; then
            candidates="[]"
          fi

          count=$(echo "$candidates" | jq 'length')
          echo "📦 Found $count repositories without Pages"
          echo "candidates=$candidates" >> $GITHUB_OUTPUT
          echo "count=$count" >> $GITHUB_OUTPUT

  setup-pages:
    name: "Setup Pages for ${{ matrix.name }}"
    runs-on: ubuntu-latest
    needs: discover-candidates
    if: ${{ needs.discover-candidates.outputs.count != '0' }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-candidates.outputs.candidates) }}

    steps:
      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq gh coreutils

      - name: Ensure gh-pages branch exists
        run: |
          set -e
          echo "📄 Enabling Pages for ${{ matrix.name }}"

          if ! gh api "/repos/$OWNER/${{ matrix.name }}/branches/gh-pages" >/dev/null 2>&1; then
            latest_commit=$(gh api "/repos/$OWNER/${{ matrix.name }}/commits?per_page=1" --jq '.[0].sha')
            gh api -X POST "/repos/$OWNER/${{ matrix.name }}/git/refs" \
              -f ref='refs/heads/gh-pages' \
              -f sha="$latest_commit"
          fi

      - name: Enable GitHub Pages
        run: |
          set -e
          gh api -X POST "/repos/$OWNER/${{ matrix.name }}/pages" \
            --input - <<'EOF' || true
          {
            "source": {
              "branch": "gh-pages",
              "path": "/"
            }
          }
          EOF

      - name: Deploy Documentation Template
        if: ${{ github.event.inputs.template == '' || github.event.inputs.template == 'documentation' }}
        run: |
          set -e
          content=$(cat <<EOF
          # ${{ matrix.name }}

          ## Overview

          Project site for \`${{ matrix.name }}\`.

          ## Getting Started

          - Clone: \`git clone https://github.com/$OWNER/${{ matrix.name }}\`
          - Pages URL: https://$OWNER.github.io/${{ matrix.name }}/

          ## License

          See LICENSE file for details.
          EOF
          )
          encoded=$(printf '%s' "$content" | base64 -w 0)

          gh api -X PUT "/repos/$OWNER/${{ matrix.name }}/contents/README.md" \
            -f message='docs: initialize GitHub Pages content' \
            -f content="$encoded" \
            -f branch='gh-pages'

      - name: Generate AI Customization Suggestions
        if: ${{ github.event.inputs.ai_customize == 'true' }}
        run: |
          echo "🤖 AI customization suggestions are not wired yet."
          echo "Suggested focus for ${{ matrix.name }}: homepage copy, navigation, and layout."

      - name: Create Summary
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          ## Pages Setup Summary

          | Property | Value |
          |----------|-------|
          | Repository | ${{ matrix.name }} |
          | Pages URL | https://$OWNER.github.io/${{ matrix.name }}/ |
          | Status | Enabled |
          EOF

  summary:
    name: "Pages Setup Summary"
    runs-on: ubuntu-latest
    needs: setup-pages
    if: always()
    steps:
      - name: Setup Complete
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          # Pages Auto-Setup Complete

          Successfully configured GitHub Pages for the selected repositories.
          EOF

