# =============================================================================
# ORG SELF-HEAL
# =============================================================================
# Purpose: Scheduled maintenance across the entire organization
#
# Features:
#   - Automatically fixes common code quality issues
#   - Runs formatting fixes across all repositories
#   - Fixes whitespace issues and trailing spaces
#   - Validates YAML files
#   - Cleans markdown formatting
#   - Updates lockfiles where possible
#
# Triggers:
#   - Schedule: Daily at 3 AM UTC
#   - Manual dispatch for on-demand maintenance
#
# Maintenance Tasks:
#   1. Format JavaScript/TypeScript (ESLint, Prettier)
#   2. Format Python (Black, isort, Ruff)
#   3. Format Go (gofmt)
#   4. Format Rust (rustfmt)
#   5. Clean whitespace and trailing spaces
#   6. Validate YAML syntax
#   7. Fix Markdown formatting
#   8. Update dependency lockfiles
#
# Safety Features:
#   - Skips repositories with "no-autofix" label
#   - Skips PRs where last commit author is a bot
#   - Creates PRs instead of direct commits (for review)
#   - Limits changes per run to prevent overwhelming
#   - Respects branch protection rules
#
# Bot Author Skip Rule:
#   - Skip if last commit author is a bot:
#     * dependabot[bot]
#     * amazon-q[bot]
#     * github-actions[bot]
#     * llamabot
#     * google-jules[bot]
# =============================================================================

name: "🔧 Org Self-Heal"

on:
  schedule:
    # Run daily at 3 AM UTC
    - cron: "0 3 * * *"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub organization name"
        required: false
        type: string
      repos:
        description: "Comma-separated list of repos to process (empty = all)"
        required: false
        type: string
      create_pr:
        description: "Create PRs instead of direct commits"
        required: false
        type: boolean
        default: true
      max_repos:
        description: "Maximum repositories to process (0 = unlimited)"
        required: false
        type: number
        default: "0"

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  ORG_NAME: ${{ github.event.inputs.org || github.repository_owner }}
  SPECIFIC_REPOS: ${{ github.event.inputs.repos || '' }}
  CREATE_PR: ${{ github.event.inputs.create_pr || true }}
  MAX_REPOS: ${{ github.event.inputs.max_repos || 0 }}
  COMMIT_EMAIL: "org-brain-bot@github.com"
  COMMIT_NAME: "Org Brain Bot"
  BRANCH_NAME: "org-brain/auto-maintenance"
  PR_TITLE: "chore: automated repository maintenance"
  PR_BODY: |
    ## 🤖 Org Brain Automated Maintenance
    
    This PR was created automatically by the Org Brain self-heal workflow.
    
    ### Changes Included:
    - Whitespace cleanup
    - Trailing space removal
    - Code formatting (language-specific)
    - YAML validation
    - Markdown formatting
    - Lockfile updates (where applicable)
    
    ### Review Checklist:
    - [ ] Review the changes
    - [ ] Run local tests if applicable
    - [ ] Merge if everything looks good
    
    ---
    *Generated by 🧠 Org Brain*

jobs:
  # ===========================================================================
  # DISCOVER REPOSITORIES
  # ===========================================================================
  discover-repos:
    name: "Discover Repositories"
    runs-on: ubuntu-latest
    outputs:
      repo_list: ${{ steps.get-repos.outputs.repo_list }}
      repo_count: ${{ steps.get-repos.outputs.repo_count }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Get repositories to process
        id: get-repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "$SPECIFIC_REPOS" ]; then
            # Use specific repos from input
            repo_list="$SPECIFIC_REPOS"
            repo_count=$(echo "$repo_list" | tr ',' '\n' | wc -l)
            echo "📦 Using specified repositories: $repo_list"
          else
            # Discover all repositories
            echo "🔍 Discovering repositories in organization: $ORG_NAME"
            
            repos_json=$(gh api "/orgs/$ORG_NAME/repos?per_page=100&type=all" --paginate)
            
            # Filter out archived repositories
            active_repos=$(echo "$repos_json" | jq -r '[.[] | select(.archived == false) | .name] | join(",")')
            repo_count=$(echo "$repos_json" | jq -r '[.[] | select(.archived == false)] | length')
            
            repo_list="$active_repos"
            
            echo "📦 Found $repo_count active repositories"
          fi
          
          # Apply max_repos limit
          if [ "$MAX_REPOS" -gt 0 ] && [ "$repo_count" -gt "$MAX_REPOS" ]; then
            repo_list=$(echo "$repo_list" | tr ',' '\n' | head -n "$MAX_REPOS" | tr '\n' ',' | sed 's/,$//')
            repo_count="$MAX_REPOS"
            echo "⚠️  Limited to $MAX_REPOS repositories"
          fi
          
          echo "repo_list=$repo_list" >> $GITHUB_OUTPUT
          echo "repo_count=$repo_count" >> $GITHUB_OUTPUT

  # ===========================================================================
  # RUN MAINTENANCE ON EACH REPOSITORY
  # ===========================================================================
  run-maintenance:
    name: "Maintain: ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: ${{ needs.discover-repos.outputs.repo_count > 0 }}
    strategy:
      max-parallel: 8
      fail-fast: false
      matrix:
        repo: ${{ fromJson(format('["{0}"]', join(needs.discover-repos.outputs.repo_list, '","'))) }}
    outputs:
      changes_made_${{ matrix.repo }}: ${{ steps.maintain.outputs.changes_made }}
      pr_created_${{ matrix.repo }}: ${{ steps.maintain.outputs.pr_created }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt

      - name: Install maintenance tools
        run: |
          # Python tools
          pip install --quiet black isort ruff yamlfix 2>/dev/null || true
          
          # Node tools (will be installed per-repo if needed)
          npm install -g prettier eslint markdownlint-cli 2>/dev/null || true
          
          # YAML lint
          pip install --quiet yamllint 2>/dev/null || true
          
          echo "✅ Maintenance tools installed"

      - name: Clone and Maintain Repository
        id: maintain
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ matrix.repo }}
        run: |
          #!/bin/bash
          set -e
          
          echo "🔧 Running maintenance on: $REPO_NAME"
          repo_url="https://github.com/$ORG_NAME/$REPO_NAME.git"

          # Check if repo has no-autofix label on any open PRs or as repo topic
          repo_topics=$(gh api "/repos/$ORG_NAME/$REPO_NAME" --jq '.topics[]' 2>/dev/null | tr '\n' ',')
          if echo "$repo_topics" | grep -qi "no-autofix"; then
            echo "⏭️  Skipping: Repository has 'no-autofix' topic"
            echo "changes_made=false" >> $GITHUB_OUTPUT
            echo "pr_created=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for open PRs where last commit is from a bot
          # Bot authors: dependabot[bot], amazon-q[bot], github-actions[bot], llamabot, google-jules[bot]
          open_prs=$(gh pr list --repo "$ORG_NAME/$REPO_NAME" --state open --limit 100 --json number 2>/dev/null || echo "[]")
          pr_count=$(echo "$open_prs" | jq 'length')
          
          if [ "$pr_count" -gt 0 ]; then
            skip_maintenance=false
            echo "$open_prs" | jq -c '.[]' | while read -r pr; do
              pr_num=$(echo "$pr" | jq -r '.number')
              last_author=$(gh api "/repos/$ORG_NAME/$REPO_NAME/pulls/$pr_num/commits" --jq '.[-1].commit.author.name' 2>/dev/null || echo "")
              if [ "$last_author" = "dependabot[bot]" ] || [ "$last_author" = "amazon-q[bot]" ] || [ "$last_author" = "github-actions[bot]" ] || [ "$last_author" = "llamabot" ] || [ "$last_author" = "google-jules[bot]" ]; then
                echo "bot_pr" >> /tmp/bot_prs_$REPO_NAME.txt
              fi
            done
            
            if [ -f /tmp/bot_prs_$REPO_NAME.txt ]; then
              bot_pr_count=$(wc -l < /tmp/bot_prs_$REPO_NAME.txt)
              if [ "$bot_pr_count" -gt 0 ]; then
                echo "⏭️  Skipping: Found $bot_pr_count open PR(s) with bot-authored last commits"
                echo "changes_made=false" >> $GITHUB_OUTPUT
                echo "pr_created=false" >> $GITHUB_OUTPUT
                rm -f /tmp/bot_prs_$REPO_NAME.txt
                exit 0
              fi
            fi
            rm -f /tmp/bot_prs_$REPO_NAME.txt
          fi

          # Clone the repository (main branch)
          git clone --depth 1 "$repo_url" workdir
          cd workdir
          
          # Configure git
          git config user.email "$COMMIT_EMAIL"
          git config user.name "$COMMIT_NAME"
          
          # Create maintenance branch
          git checkout -b "$BRANCH_NAME"
          
          changes_made=false
          
          # =========================================================================
          # DETECT PROJECT TYPE AND APPLY FIXES
          # =========================================================================
          
          # JavaScript/TypeScript
          if [ -f "package.json" ]; then
            echo "📦 JavaScript/TypeScript project detected"
            
            # Install dependencies
            if [ -f "package-lock.json" ]; then
              npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts 2>/dev/null || true
            elif [ -f "yarn.lock" ]; then
              yarn install --ignore-scripts 2>/dev/null || true
            elif [ -f "pnpm-lock.yaml" ]; then
              pnpm install --ignore-scripts 2>/dev/null || true
            else
              npm install --ignore-scripts 2>/dev/null || true
            fi
            
            # Run ESLint fix if configured
            if [ -f ".eslintrc" ] || [ -f ".eslintrc.js" ] || [ -f ".eslintrc.json" ] || [ -f "eslint.config.js" ] || grep -q "\"eslint\"" package.json 2>/dev/null; then
              echo "   → Running ESLint --fix"
              npx eslint --fix . 2>/dev/null && changes_made=true || true
            fi
            
            # Run Prettier if configured
            if [ -f ".prettierrc" ] || [ -f ".prettierrc.js" ] || [ -f ".prettierrc.json" ] || [ -f "prettier.config.js" ] || grep -q "\"prettier\"" package.json 2>/dev/null; then
              echo "   → Running Prettier"
              npx prettier --write "**/*.{js,jsx,ts,tsx,json,css,scss,md}" 2>/dev/null && changes_made=true || true
            fi
          fi
          
          # Python
          if [ -f "requirements.txt" ] || [ -f "setup.py" ] || [ -f "pyproject.toml" ] || [ -f "*.py" ]; then
            echo "🐍 Python project detected"
            
            # Run Ruff fix
            if command -v ruff &> /dev/null; then
              echo "   → Running Ruff check --fix"
              ruff check --fix . 2>/dev/null && changes_made=true || true
            fi
            
            # Run Black
            if command -v black &> /dev/null; then
              echo "   → Running Black"
              black . 2>/dev/null && changes_made=true || true
            fi
            
            # Run isort
            if command -v isort &> /dev/null; then
              echo "   → Running isort"
              isort . 2>/dev/null && changes_made=true || true
            fi
          fi
          
          # Go
          if [ -f "go.mod" ]; then
            echo "🐹 Go project detected"
            
            # Run gofmt
            echo "   → Running gofmt"
            find . -name "*.go" -not -path "./vendor/*" -exec gofmt -w {} \; 2>/dev/null && changes_made=true || true
            
            # Run go mod tidy
            echo "   → Running go mod tidy"
            go mod tidy 2>/dev/null && changes_made=true || true
          fi
          
          # Rust
          if [ -f "Cargo.toml" ]; then
            echo "🦀 Rust project detected"
            
            # Run rustfmt
            if command -v cargo &> /dev/null; then
              echo "   → Running cargo fmt"
              cargo fmt 2>/dev/null && changes_made=true || true
            fi
          fi
          
          # =========================================================================
          # GENERAL CLEANUP (applies to all repos)
          # =========================================================================
          
          echo "🧹 Running general cleanup"
          
          # Remove trailing whitespace from text files
          echo "   → Removing trailing whitespace"
          find . -type f \( \
            -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \
            -o -name "*.py" -o -name "*.go" -o -name "*.rs" \
            -o -name "*.java" -o -name "*.cpp" -o -name "*.c" -o -name "*.h" \
            -o -name "*.css" -o -name "*.scss" -o -name "*.html" \
            -o -name "*.md" -o -name "*.txt" -o -name "*.yaml" -o -name "*.yml" \
            -o -name "*.json" -o -name "*.toml" -o -name "*.xml" \
          \) \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./vendor/*" \
            -not -path "./target/*" \
            -not -path "./dist/*" \
            -not -path "./build/*" \
            -exec sed -i 's/[[:space:]]*$//' {} \; 2>/dev/null && changes_made=true || true
          
          # Ensure files end with newline
          echo "   → Ensuring files end with newline"
          find . -type f \( \
            -name "*.js" -o -name "*.jsx" -o -name "*.ts" -o -name "*.tsx" \
            -o -name "*.py" -o -name "*.go" -o -name "*.rs" \
            -o -name "*.md" -o -name "*.txt" -o -name "*.yaml" -o -name "*.yml" \
          \) \
            -not -path "./.git/*" \
            -not -path "./node_modules/*" \
            -not -path "./vendor/*" \
            -not -path "./target/*" \
            -exec sh -c 'echo "" >> "$1"' _ {} \; 2>/dev/null && changes_made=true || true
          
          # YAML validation (check only, report issues)
          echo "   → Validating YAML files"
          if command -v yamllint &> /dev/null; then
            yamllint . 2>/dev/null || true
          fi
          
          # Markdown lint (check only)
          echo "   → Checking Markdown formatting"
          if command -v markdownlint &> /dev/null; then
            markdownlint "**/*.md" --fix 2>/dev/null && changes_made=true || true
          fi
          
          # Update lockfiles
          echo "   → Updating lockfiles"
          
          if [ -f "package.json" ] && [ -f "package-lock.json" ]; then
            echo "      Updating package-lock.json"
            npm install --package-lock-only --ignore-scripts 2>/dev/null && changes_made=true || true
          fi
          
          if [ -f "Gemfile" ] && command -v bundle &> /dev/null; then
            echo "      Updating Gemfile.lock"
            bundle update --bundler 2>/dev/null && changes_made=true || true
          fi
          
          if [ -f "go.mod" ]; then
            echo "      Updating go.sum"
            go mod tidy 2>/dev/null && changes_made=true || true
          fi
          
          if [ -f "Cargo.toml" ] && [ -f "Cargo.lock" ]; then
            echo "      Updating Cargo.lock"
            cargo update 2>/dev/null && changes_made=true || true
          fi
          
          cd ..
          
          # =========================================================================
          # COMMIT AND PUSH CHANGES
          # =========================================================================
          
          if ! git -C workdir diff --quiet; then
            echo "💾 Changes detected"
            cd workdir
            
            git add -A
            
            if ! git diff --cached --quiet; then
              git commit -m "$PR_TITLE"
              
              if [ "$CREATE_PR" = "true" ]; then
                # Push and create PR
                echo "🚀 Pushing changes and creating PR"
                git push -u origin "$BRANCH_NAME"
                
                # Check if PR already exists
                existing_pr=$(gh pr list --repo "$ORG_NAME/$REPO_NAME" --head "$BRANCH_NAME" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")
                
                if [ -n "$existing_pr" ]; then
                  echo "ℹ️  PR already exists: #$existing_pr"
                  echo "changes_made=true" >> $GITHUB_OUTPUT
                  echo "pr_created=false" >> $GITHUB_OUTPUT
                else
                  # Create new PR
                  pr_url=$(gh pr create \
                    --repo "$ORG_NAME/$REPO_NAME" \
                    --title "$PR_TITLE" \
                    --body "$PR_BODY" \
                    --head "$BRANCH_NAME" \
                    --base "main" \
                    --label "automated-pr" \
                    2>/dev/null || echo "")
                  
                  if [ -n "$pr_url" ]; then
                    echo "✅ PR created: $pr_url"
                    echo "changes_made=true" >> $GITHUB_OUTPUT
                    echo "pr_created=true" >> $GITHUB_OUTPUT
                  else
                    echo "⚠️  Failed to create PR (may need label permissions)"
                    echo "changes_made=true" >> $GITHUB_OUTPUT
                    echo "pr_created=false" >> $GITHUB_OUTPUT
                  fi
                fi
              else
                # Direct commit to main
                echo "🚀 Pushing changes directly"
                git push
                echo "changes_made=true" >> $GITHUB_OUTPUT
                echo "pr_created=false" >> $GITHUB_OUTPUT
              fi
            else
              echo "ℹ️  No changes to commit after staging"
              echo "changes_made=false" >> $GITHUB_OUTPUT
              echo "pr_created=false" >> $GITHUB_OUTPUT
            fi
            cd ..
          else
            echo "ℹ️  No changes needed"
            echo "changes_made=false" >> $GITHUB_OUTPUT
            echo "pr_created=false" >> $GITHUB_OUTPUT
          fi

  # ===========================================================================
  # GENERATE SUMMARY REPORT
  # ===========================================================================
  generate-report:
    name: "Generate Maintenance Report"
    runs-on: ubuntu-latest
    needs: [discover-repos, run-maintenance]
    if: always()
    steps:
      - name: Generate Summary Report
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🔧 Org Self-Heal - Maintenance Report
          
          ## Execution Summary
          
          | Metric | Value |
          |--------|-------|
          | Organization | $ORG_NAME |
          | Repositories Processed | ${{ needs.discover-repos.outputs.repo_count }} |
          | Execution Time | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
          | Mode | ${{ env.CREATE_PR == 'true' && 'PR Creation' || 'Direct Commit' }} |
          
          ## Maintenance Tasks Performed
          
          - ✅ Whitespace cleanup
          - ✅ Trailing space removal
          - ✅ Code formatting (language-specific)
          - ✅ YAML validation
          - ✅ Markdown formatting
          - ✅ Lockfile updates
          
          ## Next Steps
          
          - Review any created PRs
          - Check failed runs in job logs
          - Add \`no-autofix\` topic to repos that should be excluded
          
          ---
          *Generated by 🧠 Org Brain Self-Heal*
          EOF
