# =============================================================================
# INSTALL TOKEN TO ALL REPOS - Bulk Secret Installation
# =============================================================================
# Purpose: Install ORG_AUTOMATION_TOKEN secret to all repositories under 940smiley
#
# Usage:
#   1. Go to Actions → Install Token to All Repos
#   2. Click "Run workflow"
#   3. Paste your Fine-Grained PAT
#   4. Workflow installs secret to all repos
# =============================================================================

name: "🔐 Install Token to All Repos"

on:
  workflow_dispatch:
    inputs:
      pat:
        description: "Fine-Grained PAT for ORG_AUTOMATION_TOKEN (will be encrypted)"
        required: true
        type: string
      owner:
        description: "GitHub username/organization"
        required: false
        type: string
        default: "940smiley"
      skip_existing:
        description: "Skip repos that already have the secret"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  OWNER: ${{ inputs.owner || '940smiley' }}
  SECRET_NAME: "ORG_AUTOMATION_TOKEN"
  OUTPUT_DIR: "data/token-install"
  # CRITICAL: Pass token to ALL steps via environment variable
  ORG_AUTOMATION_TOKEN: ${{ inputs.pat }}

jobs:
  install-secrets:
    name: "Install Secrets"
    runs-on: ubuntu-latest
    outputs:
      success_count: ${{ steps.install.outputs.success_count }}
      failure_count: ${{ steps.install.outputs.failure_count }}
      skip_count: ${{ steps.install.outputs.skip_count }}
      total_count: ${{ steps.install.outputs.total_count }}
    steps:
      - name: Checkout Org-Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl python3 python3-pip
          pip3 install pynacl
          which gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && sudo apt-get update && sudo apt-get install -y gh)

      - name: Create output directory
        run: mkdir -p $OUTPUT_DIR

      - name: DEBUG - Show environment
        run: |
          echo "=== DEBUG: Environment Variables ==="
          echo "OWNER: $OWNER"
          echo "SECRET_NAME: $SECRET_NAME"
          echo "OUTPUT_DIR: $OUTPUT_DIR"
          echo "ORG_AUTOMATION_TOKEN set: ${ORG_AUTOMATION_TOKEN:+YES}"
          echo "ORG_AUTOMATION_TOKEN length: ${#ORG_AUTOMATION_TOKEN}"
          echo "====================================="

      - name: VALIDATE - Check token received
        run: |
          echo "=== VALIDATION: Checking token ==="
          
          # HARD FAIL if token is missing
          if [ -z "$ORG_AUTOMATION_TOKEN" ]; then
            echo "ERROR: No token received!"
            echo "The ORG_AUTOMATION_TOKEN environment variable is empty."
            echo "Check that the workflow input 'pat' is provided."
            exit 1
          fi
          
          echo "Token validation passed"
          echo "Token length: ${#ORG_AUTOMATION_TOKEN} characters"

      - name: PREFLIGHT - Check GitHub API access
        env:
          GH_TOKEN: ${{ inputs.pat }}
        run: |
          echo "=== PREFLIGHT: Checking GitHub API access ==="
          
          user_login=$(gh api user --jq '.login' 2>&1)
          api_exit_code=$?
          
          if [ $api_exit_code -ne 0 ]; then
            echo "ERROR: GitHub API access failed!"
            echo "Response: $user_login"
            exit 1
          fi
          
          echo "API access confirmed"
          echo "Authenticated as: $user_login"

      - name: Enumerate repositories
        id: enumerate
        env:
          GH_TOKEN: ${{ inputs.pat }}
        run: |
          echo "=== ENUMERATION: Fetching repositories ==="
          
          repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=all" --paginate 2>/dev/null || echo "[]")
          
          if [ "$repos_json" = "[]" ] || [ -z "$repos_json" ]; then
            echo "WARNING: No repositories found"
            echo "repos=[]" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Filter out archived repos
          active_repos=$(echo "$repos_json" | jq -c '[.[] | select(.archived == false) | {name: .name, private: .private}]')
          repo_count=$(echo "$active_repos" | jq 'length')
          
          echo "Found $repo_count active repositories"
          
          # Save repo names to file for script
          echo "$active_repos" | jq -r '.[].name' > $OUTPUT_DIR/repos.txt
          
          echo "Repository list:"
          cat $OUTPUT_DIR/repos.txt
          
          echo "repos=$active_repos" >> $GITHUB_OUTPUT
          echo "count=$repo_count" >> $GITHUB_OUTPUT
          echo "$active_repos" > $OUTPUT_DIR/repos.json

      - name: Install secrets to repositories
        id: install
        if: steps.enumerate.outputs.count > 0
        env:
          GH_TOKEN: ${{ inputs.pat }}
          SKIP_EXISTING: "${{ github.event.inputs.skip_existing || 'false' }}"
        run: |
          echo "=== INSTALLATION: Installing secrets ==="
          echo "Secret Name: $SECRET_NAME"
          echo "Skip Existing: $SKIP_EXISTING"
          echo ""
          
          repos_file="$OUTPUT_DIR/repos.json"
          if [ ! -f "$repos_file" ]; then
            echo "ERROR: Repository list file not found: $repos_file"
            exit 1
          fi
          
          success_count=0
          failure_count=0
          skip_count=0
          total_count=$(jq 'length' "$repos_file")
          
          echo "Total repositories to process: $total_count"
          echo ""
          
          > $OUTPUT_DIR/results.jsonl
          
          # Process each repository
          jq -c '.[]' "$repos_file" | while read -r repo_info; do
            repo_name=$(echo "$repo_info" | jq -r '.name')
            is_private=$(echo "$repo_info" | jq -r '.private')
            
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: $repo_name (private: $is_private)"
            
            # Create log file for this repo
            log_file="$OUTPUT_DIR/${repo_name}.log"
            echo "Log: $repo_name" > "$log_file"
            echo "Started: $(date -u)" >> "$log_file"
            
            # Fetch repo's public key for encryption
            echo "  Fetching public key..." | tee -a "$log_file"
            key_response=$(gh api "/repos/$OWNER/$repo_name/actions/secrets/public-key" 2>&1) || true
            
            if ! echo "$key_response" | jq -e '.key_id' > /dev/null 2>&1; then
              echo "  Failed to fetch public key: $key_response" | tee -a "$log_file"
              failure_count=$((failure_count + 1))
              echo "{\"repo\":\"$repo_name\",\"status\":\"failed\",\"error\":\"Failed to fetch public key\"}" >> $OUTPUT_DIR/results.jsonl
              echo "Error: $key_response" >> "$log_file"
              continue
            fi
            
            key_id=$(echo "$key_response" | jq -r '.key_id')
            public_key=$(echo "$key_response" | jq -r '.key')
            
            echo "  Key ID: $key_id" | tee -a "$log_file"
            
            # Check if secret already exists
            if [ "$SKIP_EXISTING" = "true" ]; then
              echo "  Checking if secret exists..." | tee -a "$log_file"
              check_response=$(gh api "/repos/$OWNER/$repo_name/actions/secrets/$SECRET_NAME" 2>&1 || true)
              
              if echo "$check_response" | jq -e '.name' > /dev/null 2>&1; then
                echo "  Secret already exists, skipping" | tee -a "$log_file"
                skip_count=$((skip_count + 1))
                echo "{\"repo\":\"$repo_name\",\"status\":\"skipped\",\"reason\":\"Secret already exists\"}" >> $OUTPUT_DIR/results.jsonl
                echo "Skipped: Secret already exists" >> "$log_file"
                continue
              fi
            fi
            
            # Encrypt the token using Python/PyNaCl (libsodium)
            echo "  Encrypting token..." | tee -a "$log_file"
            encrypted_value=$(PUBLIC_KEY="$public_key" python3 -c '
            import base64
            import os
            import sys
            from nacl import public

            def encrypt(public_key: str, secret_value: str) -> str:
                public_key_bytes = base64.b64decode(public_key)
                public_key_obj = public.PublicKey(public_key_bytes)
                sealed_box = public.SealedBox(public_key_obj)
                encrypted = sealed_box.encrypt(secret_value.encode("utf-8"))
                return base64.b64encode(encrypted).decode("utf-8")

            token = os.environ.get("ORG_AUTOMATION_TOKEN", "")
            if not token:
                print("ERROR: No token in environment", file=sys.stderr)
                sys.exit(1)

            print(encrypt(os.environ["PUBLIC_KEY"], token))
            ')
            
            if [ -z "$encrypted_value" ] || echo "$encrypted_value" | grep -q "ERROR"; then
              echo "  Encryption failed!" | tee -a "$log_file"
              failure_count=$((failure_count + 1))
              echo "{\"repo\":\"$repo_name\",\"status\":\"failed\",\"error\":\"Encryption failed\"}" >> $OUTPUT_DIR/results.jsonl
              echo "Encryption failed" >> "$log_file"
              continue
            fi
            
            echo "  Token encrypted successfully" | tee -a "$log_file"
            
            # Upload encrypted secret
            echo "  Uploading secret..." | tee -a "$log_file"
            upload_response=$(gh api -X PUT "/repos/$OWNER/$repo_name/actions/secrets/$SECRET_NAME" -f encrypted_value="$encrypted_value" -f key_id="$key_id" 2>&1) || true
            
            if [ -z "$upload_response" ]; then
              echo "  Successfully installed secret" | tee -a "$log_file"
              success_count=$((success_count + 1))
              echo "{\"repo\":\"$repo_name\",\"status\":\"success\"}" >> $OUTPUT_DIR/results.jsonl
              echo "Success" >> "$log_file"
            else
              echo "  Failed to upload secret: $upload_response" | tee -a "$log_file"
              failure_count=$((failure_count + 1))
              echo "{\"repo\":\"$repo_name\",\"status\":\"failed\",\"error\":\"$upload_response\"}" >> $OUTPUT_DIR/results.jsonl
              echo "Error: $upload_response" >> "$log_file"
            fi
            
            echo "Completed: $(date -u)" >> "$log_file"
          done
          
          # Count results from file
          if [ -f $OUTPUT_DIR/results.jsonl ]; then
            success_count=$(grep -c '"status":"success"' $OUTPUT_DIR/results.jsonl || echo "0")
            failure_count=$(grep -c '"status":"failed"' $OUTPUT_DIR/results.jsonl || echo "0")
            skip_count=$(grep -c '"status":"skipped"' $OUTPUT_DIR/results.jsonl || echo "0")
          fi
          
          echo ""
          echo "Installation Summary"
          echo "  Total: $total_count"
          echo "  Success: $success_count"
          echo "  Failed: $failure_count"
          echo "  Skipped: $skip_count"
          
          echo "success_count=$success_count" >> $GITHUB_OUTPUT
          echo "failure_count=$failure_count" >> $GITHUB_OUTPUT
          echo "skip_count=$skip_count" >> $GITHUB_OUTPUT
          echo "total_count=$total_count" >> $GITHUB_OUTPUT
          
          # Fail if any failures
          if [ "$failure_count" -gt 0 ]; then
            echo ""
            echo "Workflow completed with $failure_count failures"
            exit 1
          fi

      - name: Generate summary report
        if: always()
        run: |
          cat <<EOF > "$OUTPUT_DIR/summary.md"
          # Token Installation Report

          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Owner:** ${{ github.event.inputs.owner || env.OWNER }}
          **Secret Name:** ${{ env.SECRET_NAME }}

          ---

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Repositories | ${{ steps.enumerate.outputs.count || 0 }} |
          | Successful | ${{ steps.install.outputs.success_count || 0 }} |
          | Failed | ${{ steps.install.outputs.failure_count || 0 }} |
          | Skipped | ${{ steps.install.outputs.skip_count || 0 }} |

          ---

          ## Detailed Results

          \`\`\`json
          $(cat "$OUTPUT_DIR/results.jsonl" | jq -s '.' 2>/dev/null || echo "[]")
          \`\`\`
          EOF
          cat $OUTPUT_DIR/summary.md

      - name: Commit results
        if: always()
        run: |
          git config user.email "org-brain-bot@github.com"
          git config user.name "Org Brain Bot"
          
          if git diff --quiet $OUTPUT_DIR/ 2>/dev/null; then
            echo "No changes to commit"
          else
            git add $OUTPUT_DIR/
            git commit -m "chore: record token installation results"
            git push
          fi

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-install-results
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30

      - name: Generate GitHub Summary
        if: always()
        run: |
          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          # Token Installation Complete

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Repositories | ${{ steps.enumerate.outputs.count || 0 }} |
          | Successful | ${{ steps.install.outputs.success_count || 0 }} |
          | Failed | ${{ steps.install.outputs.failure_count || 0 }} |
          | Skipped | ${{ steps.install.outputs.skip_count || 0 }} |

          ## Results

          - **Detailed Report:** \`data/token-install/summary.md\`
          - **Artifact:** Download from workflow run
          EOF
