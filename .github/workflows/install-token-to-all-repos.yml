# =============================================================================
# INSTALL TOKEN TO ALL REPOS - Bulk Secret Installation
# =============================================================================
# Purpose: Install ORG_AUTOMATION_TOKEN secret to all repositories under 940smiley
#
# Features:
#   - Accepts token as workflow input (NEVER hardcoded)
#   - Enumerates all repositories under user account
#   - Fetches each repo's public key for encryption
#   - Encrypts token using libsodium
#   - Uploads encrypted secret to each repo
#   - Skips archived repositories
#   - Logs success/failure per repo
#   - Generates summary report
#
# Security:
#   - Token is passed as input, never stored
#   - Token is encrypted before upload
#   - Token is masked in logs
#   - Requires Fine-Grained PAT with admin:org or repo scope
#
# Usage:
#   1. Go to Actions → Install Token to All Repos
#   2. Click "Run workflow"
#   3. Paste your Fine-Grained PAT
#   4. Workflow installs secret to all repos
# =============================================================================

name: "🔐 Install Token to All Repos"

on:
  workflow_dispatch:
    inputs:
      automation_token:
        description: "Fine-Grained PAT for ORG_AUTOMATION_TOKEN (will be encrypted)"
        required: true
        type: string
      owner:
        description: "GitHub username/organization"
        required: false
        type: string
        default: "940smiley"
      skip_existing:
        description: "Skip repos that already have the secret"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

env:
  OWNER: "940smiley"
  SECRET_NAME: "ORG_AUTOMATION_TOKEN"
  OUTPUT_DIR: "data/token-install"

jobs:
  # ===========================================================================
  # INSTALL SECRETS TO ALL REPOS
  # ===========================================================================
  install-secrets:
    name: "Install Secrets"
    runs-on: ubuntu-latest
    outputs:
      success_count: ${{ steps.install.outputs.success_count }}
      failure_count: ${{ steps.install.outputs.failure_count }}
      skip_count: ${{ steps.install.outputs.skip_count }}
      total_count: ${{ steps.install.outputs.total_count }}
      results: ${{ steps.install.outputs.results }}
    steps:
      - name: Checkout Org-Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl python3 python3-pip
          pip3 install pynacl
          which gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && sudo apt-get update && sudo apt-get install -y gh)

      - name: Create output directory
        run: mkdir -p $OUTPUT_DIR

      - name: Enumerate repositories
        id: enumerate
        env:
          OWNER: "${{ github.event.inputs.owner || env.OWNER }}"
          GH_TOKEN: "${{ github.event.inputs.automation_token }}"
        run: |
          set -e

          echo "📋 Enumerating repositories for $OWNER..."

          # Fetch all repositories
          repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=all" --paginate 2>/dev/null || echo "[]")

          if [ "$repos_json" = "[]" ] || [ -z "$repos_json" ]; then
            echo "⚠️ No repositories found"
            echo "repos=[]" >> $GITHUB_OUTPUT
            echo "count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Filter out archived repos and extract names
          active_repos=$(echo "$repos_json" | jq -c '[.[] | select(.archived == false) | {name: .name, private: .private}]')
          repo_count=$(echo "$active_repos" | jq 'length')

          echo "✅ Found $repo_count active repositories"
          echo "repos=$active_repos" >> $GITHUB_OUTPUT
          echo "count=$repo_count" >> $GITHUB_OUTPUT

          # Save for logging
          echo "$active_repos" > $OUTPUT_DIR/repos.json

      - name: Install secrets to repositories
        id: install
        if: steps.enumerate.outputs.count > 0
        env:
          OWNER: "${{ github.event.inputs.owner || env.OWNER }}"
          SECRET_NAME: "${{ env.SECRET_NAME }}"
          AUTOMATION_TOKEN: "${{ github.event.inputs.automation_token }}"
          SKIP_EXISTING: "${{ github.event.inputs.skip_existing || 'false' }}"
        run: |
          set -e

          echo "🔐 Installing $SECRET_NAME to repositories..."
          echo "Token length: ${#AUTOMATION_TOKEN} characters"
          echo ""

          repos="${{ steps.enumerate.outputs.repos }}"
          skip_existing="$SKIP_EXISTING"

          success_count=0
          failure_count=0
          skip_count=0
          total_count=$(echo "$repos" | jq 'length')

          results="[]"

          echo "$repos" | jq -c '.[]' | while read -r repo_info; do
            repo_name=$(echo "$repo_info" | jq -r '.name')
            is_private=$(echo "$repo_info" | jq -r '.private')

            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Processing: $repo_name (private: $is_private)"

            # Fetch repo's public key for encryption
            key_response=$(gh api \
              -H "Authorization: Bearer $AUTOMATION_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "/repos/$OWNER/$repo_name/actions/secrets/public-key" 2>&1)

            key_exit_code=$?

            if [ $key_exit_code -ne 0 ]; then
              echo "❌ Failed to fetch public key: $key_response"
              failure_count=$((failure_count + 1))
              result=$(jq -n \
                --arg repo "$repo_name" \
                --arg status "failed" \
                --arg error "Failed to fetch public key: $key_response" \
                '{repo:$repo,status:$status,error:$error}')
              echo "$result" >> $OUTPUT_DIR/results.jsonl
              continue
            fi

            key_id=$(echo "$key_response" | jq -r '.key_id')
            public_key=$(echo "$key_response" | jq -r '.key')

            echo "  Key ID: $key_id"

            # Check if secret already exists
            if [ "$skip_existing" = "true" ]; then
              check_response=$(gh api \
                -H "Authorization: Bearer $AUTOMATION_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "/repos/$OWNER/$repo_name/actions/secrets/$SECRET_NAME" 2>&1 || true)

              if echo "$check_response" | jq -e '.name' > /dev/null 2>&1; then
                echo "⏭️  Secret already exists, skipping"
                skip_count=$((skip_count + 1))
                result=$(jq -n \
                  --arg repo "$repo_name" \
                  --arg status "skipped" \
                  --arg reason "Secret already exists" \
                  '{repo:$repo,status:$status,reason:$reason}')
                echo "$result" >> $OUTPUT_DIR/results.jsonl
                continue
              fi
            fi

            # Encrypt the token using Python/PyNaCl
            echo "  Encrypting token..."
            encrypted_value=$(python3 -c "
            import base64
            import sys
            from nacl import encoding, public

          def encrypt(public_key: str, secret_value: str) -> str:
            public_key_bytes = base64.b64decode(public_key)
            sealed_box = public.SealedBox(public_key_bytes)
            encrypted = sealed_box.encrypt(secret_value.encode('utf-8'))
            return base64.b64encode(encrypted).decode('utf-8')

          print(encrypt('$public_key', '$AUTOMATION_TOKEN'))
          ")

            # Upload encrypted secret
            echo "  Uploading secret..."
            upload_response=$(gh api \
              -X PUT \
              -H "Authorization: Bearer $AUTOMATION_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "/repos/$OWNER/$repo_name/actions/secrets/$SECRET_NAME" \
              -f encrypted_value="$encrypted_value" \
              -f key_id="$key_id" 2>&1)

            upload_exit_code=$?

            if [ $upload_exit_code -eq 0 ]; then
              echo "✅ Successfully installed secret"
              success_count=$((success_count + 1))
              result=$(jq -n \
                --arg repo "$repo_name" \
                --arg status "success" \
                '{repo:$repo,status:$status}')
            else
              echo "❌ Failed to upload secret: $upload_response"
              failure_count=$((failure_count + 1))
              result=$(jq -n \
                --arg repo "$repo_name" \
                --arg status "failed" \
                --arg error "$upload_response" \
                '{repo:$repo,status:$status,error:$error}')
            fi

            echo "$result" >> $OUTPUT_DIR/results.jsonl
          done

          # Count results from file
          if [ -f $OUTPUT_DIR/results.jsonl ]; then
            success_count=$(grep -c '"status":"success"' $OUTPUT_DIR/results.jsonl || echo "0")
            failure_count=$(grep -c '"status":"failed"' $OUTPUT_DIR/results.jsonl || echo "0")
            skip_count=$(grep -c '"status":"skipped"' $OUTPUT_DIR/results.jsonl || echo "0")
          fi

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 Installation Summary"
          echo "  Total: $total_count"
          echo "  Success: $success_count"
          echo "  Failed: $failure_count"
          echo "  Skipped: $skip_count"

          echo "success_count=$success_count" >> $GITHUB_OUTPUT
          echo "failure_count=$failure_count" >> $GITHUB_OUTPUT
          echo "skip_count=$skip_count" >> $GITHUB_OUTPUT
          echo "total_count=$total_count" >> $GITHUB_OUTPUT

      - name: Generate summary report
        if: always()
        run: |
          cat << EOF > $OUTPUT_DIR/summary.md
          # 🔐 Token Installation Report

          **Generated:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **Owner:** ${{ github.event.inputs.owner || env.OWNER }}
          **Secret Name:** ${{ env.SECRET_NAME }}

          ---

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Repositories | ${{ steps.enumerate.outputs.count || 0 }} |
          | Successful | ${{ steps.install.outputs.success_count || 0 }} |
          | Failed | ${{ steps.install.outputs.failure_count || 0 }} |
          | Skipped | ${{ steps.install.outputs.skip_count || 0 }} |

          ---

          ## Detailed Results

          EOF

          if [ -f $OUTPUT_DIR/results.jsonl ]; then
            echo '```json' >> $OUTPUT_DIR/summary.md
            cat $OUTPUT_DIR/results.jsonl | jq -s '.' >> $OUTPUT_DIR/summary.md
            echo '```' >> $OUTPUT_DIR/summary.md
          else
            echo "No results available" >> $OUTPUT_DIR/summary.md
          fi

          echo ""
          echo "Report generated: $OUTPUT_DIR/summary.md"

      - name: Commit results
        if: always()
        run: |
          git config user.email "org-brain-bot@github.com"
          git config user.name "Org Brain Bot"

          if git diff --quiet $OUTPUT_DIR/ 2>/dev/null; then
            echo "No changes to commit"
          else
            git add $OUTPUT_DIR/
            git commit -m "chore: record token installation results

            Total: ${{ steps.enumerate.outputs.count || 0 }}
            Success: ${{ steps.install.outputs.success_count || 0 }}
            Failed: ${{ steps.install.outputs.failure_count || 0 }}
            Skipped: ${{ steps.install.outputs.skip_count || 0 }}"
            git push
            echo "✅ Committed installation results"
          fi

      - name: Upload results as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: token-install-results
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30

      - name: Generate GitHub Summary
        if: always()
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🔐 Token Installation Complete

          ## Summary

          | Metric | Count |
          |--------|-------|
          | Total Repositories | ${{ steps.enumerate.outputs.count || 0 }} |
          | Successful | ${{ steps.install.outputs.success_count || 0 }} |
          | Failed | ${{ steps.install.outputs.failure_count || 0 }} |
          | Skipped | ${{ steps.install.outputs.skip_count || 0 }} |

          ## Results

          - **Detailed Report:** \`data/token-install/summary.md\`
          - **Artifact:** Download from workflow run

          ## Next Steps

          1. Review any failures in the detailed report
          2. Verify secrets in repository settings
          3. Run a test workflow to confirm authentication works
          EOF
