# =============================================================================
# SCAN WORKFLOW FAILURES
# =============================================================================
# Purpose: Scan repositories for workflow failures and generate repair suggestions
# =============================================================================

name: "Scan Workflow Failures"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode"
        required: true
        type: choice
        options:
          - all
          - single
          - multiple
        default: "all"
      repository:
        description: "Single repository name (for mode=single)"
        required: false
        type: string
        default: "Org-Brain"
      repositories:
        description: "Comma-separated repo names (for mode=multiple)"
        required: false
        type: string
        default: "Org-Brain"
      max_runs_per_repo:
        description: "Maximum recent runs to check per repository"
        required: false
        type: number
        default: "30"
      include_org_brain:
        description: "Always include Org-Brain repository"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: read
  actions: read

env:
  OWNER: "940smiley"
  ORG_BRAIN_REPO: "Org-Brain"
  OUTPUT_DIR: "data/workflow-failures"
  GH_TOKEN: "${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}"

jobs:
  # ===========================================================================
  # DISCOVER REPOSITORIES
  # ===========================================================================
  discover-repos:
    name: "Discover Repositories"
    runs-on: ubuntu-latest
    outputs:
      scan_list: "${{ steps.build-list.outputs.scan_list }}"
      scan_count: "${{ steps.build-list.outputs.scan_count }}"
      mode: "${{ steps.build-list.outputs.mode }}"
    steps:
      - name: Checkout Org-Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          which gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && sudo apt-get update && sudo apt-get install -y gh)

      - name: Build repository scan list
        id: build-list
        env:
          MODE: "${{ github.event.inputs.mode || 'all' }}"
          SINGLE_REPO: "${{ github.event.inputs.repository || 'Org-Brain' }}"
          MULTIPLE_REPOS: "${{ github.event.inputs.repositories || 'Org-Brain' }}"
          INCLUDE_ORG_BRAIN: "${{ github.event.inputs.include_org_brain || 'true' }}"
        run: |
          set -e
          scan_list=""
          
          case "$MODE" in
            single)
              scan_list="$SINGLE_REPO"
              ;;
            multiple)
              scan_list="$MULTIPLE_REPOS"
              ;;
            all)
              repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=all" --paginate 2>/dev/null || echo "[]")
              if [ "$repos_json" != "[]" ]; then
                scan_list=$(echo "$repos_json" | jq -r '.[].name' | tr '\n' ',' | sed 's/,$//')
              fi
              ;;
          esac
          
          if [ "$INCLUDE_ORG_BRAIN" = "true" ] && [ -n "$scan_list" ]; then
            if ! echo ",$scan_list," | grep -q ",$ORG_BRAIN_REPO,"; then
              scan_list="$scan_list,$ORG_BRAIN_REPO"
            fi
          elif [ "$INCLUDE_ORG_BRAIN" = "true" ] && [ -z "$scan_list" ]; then
            scan_list="$ORG_BRAIN_REPO"
          fi
          
          scan_list=$(echo "$scan_list" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          scan_count=$(echo "$scan_list" | tr ',' '\n' | grep -c . || echo "0")
          
          echo "scan_list=$scan_list" >> $GITHUB_OUTPUT
          echo "scan_count=$scan_count" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "$scan_list" > /tmp/scan_list.txt
          echo "Scan list: $scan_list ($scan_count repos)"

  # ===========================================================================
  # SCAN WORKFLOW FAILURES
  # ===========================================================================
  scan-failures:
    name: "Scan: ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: "${{ needs.discover-repos.outputs.scan_count > 0 && needs.discover-repos.outputs.scan_count != '0' }}"
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        repo: "${{ fromJson(format('[\"{0}\"]', join(needs.discover-repos.outputs.scan_list, '\",\"'))) }}"
    outputs:
      has_failures: "${{ steps.scan.outputs.has_failures }}"
      failure_count: "${{ steps.scan.outputs.failure_count }}"
    steps:
      - name: Checkout Org-Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl
          which gh || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && sudo apt-get update && sudo apt-get install -y gh)

      - name: Debug - Show environment
        run: |
          echo "OWNER: $OWNER"
          echo "REPO: ${{ matrix.repo }}"
          echo "GH_TOKEN set: ${GH_TOKEN:+yes}"
          echo "GITHUB_TOKEN set: ${GITHUB_TOKEN:+yes}"
          export GH_TOKEN="${GH_TOKEN:-$GITHUB_TOKEN}"
          gh auth status 2>&1 || true
          echo "Testing API call..."
          gh api "/repos/$OWNER/${{ matrix.repo }}/actions/runs?per_page=5" 2>&1 | head -20 || echo "API call failed"

      - name: Scan repository for failures
        id: scan
        env:
          REPO: "${{ matrix.repo }}"
          MAX_RUNS: "${{ github.event.inputs.max_runs_per_repo || 30 }}"
          API_TOKEN: "${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}"
        run: |
          set -e
          export GH_TOKEN="$API_TOKEN"
          export GITHUB_TOKEN="$API_TOKEN"
          
          echo "Scanning $OWNER/$REPO for workflow failures..."
          echo "Token available: ${GH_TOKEN:+yes}"
          
          # Get all workflow runs directly
          echo "Fetching workflow runs..."
          runs_json=$(gh api "/repos/$OWNER/$REPO/actions/runs?per_page=$MAX_RUNS" 2>&1)
          api_exit_code=$?
          
          if [ $api_exit_code -ne 0 ]; then
            echo "API call failed with exit code: $api_exit_code"
            echo "Response: $runs_json"
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "failure_count=0" >> $GITHUB_OUTPUT
            echo "[]" > /tmp/failures_final_$REPO.json
            exit 0
          fi
          
          if [ -z "$runs_json" ] || [ "$runs_json" = "null" ]; then
            echo "Empty response from API"
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "failure_count=0" >> $GITHUB_OUTPUT
            echo "[]" > /tmp/failures_final_$REPO.json
            exit 0
          fi
          
          # Count total runs
          total_runs=$(echo "$runs_json" | jq '.total_count // 0')
          echo "Total runs available: $total_runs"
          
          runs_array_length=$(echo "$runs_json" | jq '.workflow_runs | length')
          echo "Runs in response: $runs_array_length"
          
          if [ "$runs_array_length" -eq 0 ]; then
            echo "No workflow runs found"
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "failure_count=0" >> $GITHUB_OUTPUT
            echo "[]" > /tmp/failures_final_$REPO.json
            exit 0
          fi
          
          # Show conclusions for debugging
          echo "Run conclusions:"
          echo "$runs_json" | jq -r '.workflow_runs[] | "  \(.name): \(.conclusion // "in_progress")"'
          
          # Filter for failures using jq
          failures=$(echo "$runs_json" | jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled") | {
            workflow: .name,
            path: .path,
            run_id: .id,
            url: .html_url,
            reason: ("Conclusion: " + .conclusion),
            timestamp: .updated_at,
            conclusion: .conclusion,
            suggestion: (
              if .conclusion == "timed_out" then "Workflow timed out. Consider increasing timeout-minutes."
              elif .conclusion == "cancelled" then "Workflow was cancelled. Check concurrency settings."
              else "Review workflow logs. Common fixes: add permissions, fix YAML syntax, ensure tokens are set."
              end
            )
          }]')
          
          failure_count=$(echo "$failures" | jq 'length')
          echo ""
          echo "=== FAILURE COUNT: $failure_count ==="
          
          # Show failures if any
          if [ "$failure_count" -gt 0 ]; then
            echo "Failures found:"
            echo "$failures" | jq -r '.[] | "  \(.workflow): \(.conclusion) - \(.url)"'
          fi
          
          # Save results
          echo "$failures" > /tmp/failures_final_$REPO.json
          
          if [ "$failure_count" -gt 0 ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi
          echo "failure_count=$failure_count" >> $GITHUB_OUTPUT

  # ===========================================================================
  # AGGREGATE AND GENERATE REPORTS
  # ===========================================================================
  generate-reports:
    name: "Generate Reports"
    runs-on: ubuntu-latest
    needs: [discover-repos, scan-failures]
    if: always()
    outputs:
      total_failures: "${{ steps.aggregate.outputs.total_failures }}"
      repos_with_failures: "${{ steps.aggregate.outputs.repos_with_failures }}"
    steps:
      - name: Checkout Org-Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Create output directory
        run: mkdir -p $OUTPUT_DIR

      - name: Aggregate all failures
        id: aggregate
        run: |
          set -e
          scan_list=$(cat /tmp/scan_list.txt 2>/dev/null || echo "${{ needs.discover-repos.outputs.scan_list }}")
          
          echo "Aggregating failures for: $scan_list"
          
          # Build repositories array
          repos_array="[]"
          for repo in $(echo "$scan_list" | tr ',' ' '); do
            [ -z "$repo" ] && continue
            failures_file="/tmp/failures_final_$repo.json"
            if [ -f "$failures_file" ]; then
              failures=$(cat "$failures_file")
            else
              failures="[]"
            fi
            repos_array=$(echo "$repos_array" | jq --arg name "$repo" --argjson failures "$failures" '. + [{name:$name,failures:$failures}]')
          done
          
          # Calculate totals
          total_failures=$(echo "$repos_array" | jq '[.[].failures | length] | add // 0')
          repos_with_failures=$(echo "$repos_array" | jq '[.[] | select(.failures | length > 0)] | length')
          repos_scanned=$(echo "$repos_array" | jq 'length')
          
          echo "Total failures: $total_failures"
          echo "Repos with failures: $repos_with_failures"
          echo "Repos scanned: $repos_scanned"
          
          # Create final JSON
          scanned_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          mode="${{ needs.discover-repos.outputs.mode }}"
          
          jq -n \
            --arg scanned_at "$scanned_at" \
            --arg mode "$mode" \
            --argjson total_failures "$total_failures" \
            --argjson repos_with_failures "$repos_with_failures" \
            --argjson repos_scanned "$repos_scanned" \
            --argjson repositories "$repos_array" \
            '{scanned_at:$scanned_at,mode:$mode,scan_summary:{total_failures:$total_failures,repos_with_failures:$repos_with_failures,repos_scanned:$repos_scanned},repositories:$repositories}' > $OUTPUT_DIR/failures.json
          
          echo "total_failures=$total_failures" >> $GITHUB_OUTPUT
          echo "repos_with_failures=$repos_with_failures" >> $GITHUB_OUTPUT

      - name: Generate Markdown summary
        run: |
          set -e
          scanned_at=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          mode="${{ needs.discover-repos.outputs.mode }}"
          
          total_failures=$(jq '.scan_summary.total_failures' $OUTPUT_DIR/failures.json)
          repos_with_failures=$(jq '.scan_summary.repos_with_failures' $OUTPUT_DIR/failures.json)
          repos_scanned=$(jq '.scan_summary.repos_scanned' $OUTPUT_DIR/failures.json)
          clean_repos=$((repos_scanned - repos_with_failures))
          
          # Generate markdown using jq for the heavy lifting
          {
            echo "# Workflow Failures Report"
            echo ""
            echo "**Generated:** $scanned_at"
            echo "**Scan Mode:** $mode"
            echo "**Repositories Scanned:** $repos_scanned"
            echo ""
            echo "---"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Failures | $total_failures |"
            echo "| Repos with Failures | $repos_with_failures |"
            echo "| Clean Repositories | $clean_repos |"
            echo ""
            echo "---"
            echo ""
            echo "## Failed Workflows"
            echo ""
            
            if [ "$total_failures" -eq 0 ]; then
              echo "**No workflow failures detected!** All workflows are running successfully."
              echo ""
              echo "Note: This might mean:"
              echo "- All workflows completed successfully"
              echo "- Workflows are still in progress (not yet concluded)"
              echo "- No workflow runs in the last ${{ github.event.inputs.max_runs_per_repo || 30 }} runs"
            else
              # Use jq to generate the failure sections
              jq -r '
                .repositories[] | 
                select(.failures | length > 0) | 
                "### \(.name) (\(.failures | length) failures)\n\n" + 
                (.failures[] | 
                  "#### \(.workflow)\n\n" +
                  "| Property | Value |\n" +
                  "|----------|-------|\n" +
                  "| **Run ID** | \(.run_id) |\n" +
                  "| **Status** | \(.conclusion) |\n" +
                  "| **Time** | \(.timestamp) |\n" +
                  "| **URL** | [View Run](\(.url)) |\n\n" +
                  "**Suggestion:** \(.suggestion)\n"
                )
              ' $OUTPUT_DIR/failures.json
            fi
            
            echo ""
            echo "---"
            echo ""
            echo "## Common Fixes"
            echo ""
            echo "| Issue | Solution |"
            echo "|-------|----------|"
            echo "| matrix.repo without matrix | Add strategy.matrix block or remove matrix.repo references |"
            echo "| /orgs/ API for user account | Change to /users/ endpoint |"
            echo "| Missing token | Add GH_TOKEN or GITHUB_TOKEN environment variable |"
            echo "| Missing checkout | Add uses: actions/checkout@v4 step |"
            echo "| Missing jq/gh | Add installation step with apt-get install |"
            echo "| Missing permissions | Add permissions block with required scopes |"
            echo ""
            echo "---"
            echo ""
            echo "*Generated by Org Brain - Workflow Failure Scanner*"
          } > $OUTPUT_DIR/summary.md
          
          echo "Generated summary.md"
          cat $OUTPUT_DIR/summary.md

      - name: Commit and push reports
        run: |
          git config user.email "org-brain-bot@github.com"
          git config user.name "Org Brain Bot"
          
          if git diff --quiet $OUTPUT_DIR/ 2>/dev/null; then
            echo "No changes to commit"
          else
            git add $OUTPUT_DIR/
            git commit -m "chore: update workflow failures report"
            git push
            echo "Committed and pushed failure reports"
          fi

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-failures-report
          path: "${{ env.OUTPUT_DIR }}/"
          retention-days: 30

      - name: Generate GitHub Summary
        run: |
          {
            echo "# Workflow Failures Scan Complete"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Failures | ${{ steps.aggregate.outputs.total_failures }} |"
            echo "| Repos with Failures | ${{ steps.aggregate.outputs.repos_with_failures }} |"
            echo "| Scan Mode | ${{ needs.discover-repos.outputs.mode }} |"
            echo ""
            echo "## Reports"
            echo "- **JSON:** \`data/workflow-failures/failures.json\`"
            echo "- **Markdown:** \`data/workflow-failures/summary.md\`"
          } >> $GITHUB_STEP_SUMMARY
