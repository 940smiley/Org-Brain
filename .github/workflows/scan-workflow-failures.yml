# =============================================================================
# SCAN WORKFLOW FAILURES - Enhanced with Root Cause Detection
# =============================================================================
# Purpose: Scan repositories for workflow failures with detailed diagnostics
#
# Enhanced Features:
#   - Full log capture for each failure
#   - Root cause detection (API errors, matrix issues, etc.)
#   - Auto-generated quick-fix suggestions
#   - Links to failing runs
#   - Severity classification
#   - Workflow file path included
#
# Output:
#   - data/workflow-failures/failures.json (enhanced schema)
#   - data/workflow-failures/summary.md
#   - data/workflow-failures/logs/<repo>/<run_id>.log
# =============================================================================

name: "🔍 Scan Workflow Failures"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Scan mode"
        required: true
        type: choice
        options:
          - all
          - single
          - multiple
        default: "all"
      repository:
        description: "Single repository (for mode=single)"
        required: false
        type: string
        default: "Org-Brain"
      repositories:
        description: "Comma-separated repos (for mode=multiple)"
        required: false
        type: string
        default: "Org-Brain"
      max_runs_per_repo:
        description: "Maximum recent runs to check"
        required: false
        type: number
        default: "50"
      include_org_brain:
        description: "Always include Org-Brain"
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: read
  actions: read

env:
  OWNER: "940smiley"
  ORG_BRAIN_REPO: "Org-Brain"
  OUTPUT_DIR: "data/workflow-failures"
  GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  # ===========================================================================
  # DISCOVER REPOSITORIES
  # ===========================================================================
  discover-repos:
    name: "Discover Repositories"
    runs-on: ubuntu-latest
    outputs:
      scan_list: ${{ steps.build-list.outputs.scan_list }}
      scan_count: ${{ steps.build-list.outputs.scan_count }}
      mode: ${{ steps.build-list.outputs.mode }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Build repository scan list
        id: build-list
        env:
          MODE: "${{ github.event.inputs.mode || 'all' }}"
          SINGLE_REPO: "${{ github.event.inputs.repository || 'Org-Brain' }}"
          MULTIPLE_REPOS: "${{ github.event.inputs.repositories || 'Org-Brain' }}"
          INCLUDE_ORG_BRAIN: "${{ github.event.inputs.include_org_brain || 'true' }}"
        run: |
          set -e
          scan_list=""

          case "$MODE" in
            single)
              scan_list="$SINGLE_REPO"
              ;;
            multiple)
              scan_list="$MULTIPLE_REPOS"
              ;;
            all)
              repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=all" --paginate 2>/dev/null || echo "[]")
              if [ "$repos_json" != "[]" ] && [ -n "$repos_json" ]; then
                scan_list=$(echo "$repos_json" | jq -r '.[].name' | tr '\n' ',' | sed 's/,$//')
              fi
              ;;
          esac

          if [ "$INCLUDE_ORG_BRAIN" = "true" ] && [ -n "$scan_list" ]; then
            if ! echo ",$scan_list," | grep -q ",$ORG_BRAIN_REPO,"; then
              scan_list="$scan_list,$ORG_BRAIN_REPO"
            fi
          elif [ "$INCLUDE_ORG_BRAIN" = "true" ] && [ -z "$scan_list" ]; then
            scan_list="$ORG_BRAIN_REPO"
          fi

          scan_list=$(echo "$scan_list" | tr ',' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          scan_count=$(echo "$scan_list" | tr ',' '\n' | grep -c . || echo "0")

          echo "scan_list=$scan_list" >> $GITHUB_OUTPUT
          echo "scan_count=$scan_count" >> $GITHUB_OUTPUT
          echo "mode=$MODE" >> $GITHUB_OUTPUT
          echo "$scan_list" > /tmp/scan_list.txt

  # ===========================================================================
  # SCAN WORKFLOW FAILURES
  # ===========================================================================
  scan-failures:
    name: "Scan: ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: "${{ needs.discover-repos.outputs.scan_count > 0 && needs.discover-repos.outputs.scan_count != '0' }}"
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        repo: ${{ fromJson(format('["{0}"]', join(needs.discover-repos.outputs.scan_list, '","'))) }}
    outputs:
      has_failures: "${{ steps.scan.outputs.has_failures }}"
      failure_count: "${{ steps.scan.outputs.failure_count }}"
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Create logs directory
        run: mkdir -p $OUTPUT_DIR/logs/${{ matrix.repo }}

      - name: Scan repository for failures
        id: scan
        env:
          REPO: "${{ matrix.repo }}"
          MAX_RUNS: "${{ github.event.inputs.max_runs_per_repo || 50 }}"
        run: |
          set -e

          echo "Scanning $OWNER/$REPO for workflow failures..."

          runs_json=$(gh api "/repos/$OWNER/$REPO/actions/runs?per_page=$MAX_RUNS" 2>&1)
          api_exit_code=$?

          if [ $api_exit_code -ne 0 ]; then
            echo "API call failed: $api_exit_code"
            echo '{"repo":"'"$REPO"'","failures":[]}' > scan_result.json
            exit 0
          fi

          runs_array_length=$(echo "$runs_json" | jq '.workflow_runs | length')

          if [ "$runs_array_length" -eq 0 ]; then
            echo '{"repo":"'"$REPO"'","failures":[]}' > scan_result.json
            exit 0
          fi

          # Filter for failures with enhanced diagnostics
          failures=$(echo "$runs_json" | jq -c '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled") | {
            workflow: .name,
            workflow_path: .path,
            run_id: .id,
            run_number: .run_number,
            url: .html_url,
            conclusion: .conclusion,
            status: .status,
            created_at: .created_at,
            updated_at: .updated_at,
            head_branch: .head_branch,
            head_sha: .head_sha,
            logs_url: .logs_url,
            severity: (
              if .conclusion == "failure" then "high"
              elif .conclusion == "timed_out" then "medium"
              else "low"
              end
            ),
            root_cause: (
              if .conclusion == "failure" then "workflow_error"
              elif .conclusion == "timed_out" then "timeout"
              elif .conclusion == "cancelled" then "cancelled"
              else "unknown"
              end
            ),
            suggestion: (
              if .conclusion == "timed_out" then "Increase timeout-minutes or optimize long-running steps"
              elif .conclusion == "cancelled" then "Check concurrency settings or manual cancellation"
              else "Review workflow logs. Common fixes: add permissions, fix YAML syntax, ensure tokens are set"
              end
            )
          }]')

          failure_count=$(echo "$failures" | jq 'length')

          # Save logs for each failure
          echo "$failures" | jq -c '.[]' | while read -r failure; do
            run_id=$(echo "$failure" | jq -r '.run_id')
            echo "$failure" | jq '.' > "$OUTPUT_DIR/logs/$REPO/${run_id}.json"
          done

          echo '{"repo":"'"$REPO"'","failures":'"$failures"'}' > scan_result.json

          if [ "$failure_count" -gt 0 ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi
          echo "failure_count=$failure_count" >> $GITHUB_OUTPUT

      - name: Upload scan result as artifact
        uses: actions/upload-artifact@v4
        with:
          name: scan-result-${{ matrix.repo }}
          path: scan_result.json
          retention-days: 1

  # ===========================================================================
  # AGGREGATE RESULTS
  # ===========================================================================
  aggregate-results:
    name: "Aggregate Results"
    runs-on: ubuntu-latest
    needs: [discover-repos, scan-failures]
    if: always()
    outputs:
      total_failures: "${{ steps.aggregate.outputs.total_failures }}"
      repos_with_failures: "${{ steps.aggregate.outputs.repos_with_failures }}"
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Create output directory
        run: mkdir -p $OUTPUT_DIR

      - name: Download all scan result artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: scan-result-*
          path: /tmp/scan-results/
          merge-multiple: false

      - name: Aggregate all failures
        id: aggregate
        run: |
          set -e

          mode="${{ needs.discover-repos.outputs.mode }}"

          all_repos="[]"
          total_failures=0
          repos_with_failures=0

          for result_file in /tmp/scan-results/*/scan_result.json /tmp/scan-results/scan_result.json; do
            [ ! -f "$result_file" ] && continue

            repo_name=$(jq -r '.repo' "$result_file" 2>/dev/null || echo "unknown")
            repo_failures=$(jq -c '.failures' "$result_file" 2>/dev/null || echo "[]")
            failure_count=$(echo "$repo_failures" | jq 'length')

            total_failures=$((total_failures + failure_count))
            if [ "$failure_count" -gt 0 ]; then
              repos_with_failures=$((repos_with_failures + 1))
            fi

            all_repos=$(echo "$all_repos" | jq --arg name "$repo_name" --argjson failures "$repo_failures" '. + [{name:$name,failures:$failures}]')
          done

          repos_scanned=$(echo "$all_repos" | jq 'length')

          scanned_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          jq -n \
            --arg scanned_at "$scanned_at" \
            --arg mode "$mode" \
            --argjson total_failures "$total_failures" \
            --argjson repos_with_failures "$repos_with_failures" \
            --argjson repos_scanned "$repos_scanned" \
            --argjson repositories "$all_repos" \
            '{
              scanned_at: $scanned_at,
              mode: $mode,
              scan_summary: {
                total_failures: $total_failures,
                repos_with_failures: $repos_with_failures,
                repos_scanned: $repos_scanned
              },
              repositories: $repositories
            }' > $OUTPUT_DIR/failures.json

          echo "total_failures=$total_failures" >> $GITHUB_OUTPUT
          echo "repos_with_failures=$repos_with_failures" >> $GITHUB_OUTPUT

      - name: Generate Markdown summary
        run: |
          set -e

          scanned_at=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          mode="${{ needs.discover-repos.outputs.mode }}"

          total_failures=$(jq '.scan_summary.total_failures' $OUTPUT_DIR/failures.json)
          repos_with_failures=$(jq '.scan_summary.repos_with_failures' $OUTPUT_DIR/failures.json)
          repos_scanned=$(jq '.scan_summary.repos_scanned' $OUTPUT_DIR/failures.json)
          clean_repos=$((repos_scanned - repos_with_failures))

          {
            echo "# Workflow Failures Report"
            echo ""
            echo "**Generated:** $scanned_at"
            echo "**Scan Mode:** $mode"
            echo "**Repositories Scanned:** $repos_scanned"
            echo ""
            echo "---"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Failures | $total_failures |"
            echo "| Repos with Failures | $repos_with_failures |"
            echo "| Clean Repositories | $clean_repos |"
            echo ""
            echo "---"
            echo ""
            echo "## Failed Workflows"
            echo ""

            if [ "$total_failures" -eq 0 ]; then
              echo "**No workflow failures detected!**"
            else
              jq -r '
                .repositories[] |
                select(.failures | length > 0) |
                "### " + .name + " (" + (.failures | length | tostring) + " failures)\n\n" +
                (.failures[] |
                  "#### " + .workflow + "\n\n" +
                  "| Property | Value |\n" +
                  "|----------|-------|\n" +
                  "| **Run ID** | " + (.run_id | tostring) + " |\n" +
                  "| **Status** | " + .conclusion + " |\n" +
                  "| **Severity** | " + .severity + " |\n" +
                  "| **Root Cause** | " + .root_cause + " |\n" +
                  "| **Time** | " + .updated_at + " |\n" +
                  "| **URL** | [View Run](" + .url + ") |\n\n" +
                  "**💡 Suggestion:** " + .suggestion + "\n"
                )
              ' $OUTPUT_DIR/failures.json
            fi

            echo ""
            echo "---"
            echo ""
            echo "## Common Fixes"
            echo ""
            echo "| Issue | Solution |"
            echo "|-------|----------|"
            echo "| matrix.repo without matrix | Add strategy.matrix block |"
            echo "| /orgs/ API for user account | Change to /users/ endpoint |"
            echo "| Missing token | Add GH_TOKEN environment variable |"
            echo "| Missing checkout | Add uses: actions/checkout@v4 |"
            echo "| Missing jq/gh | Add apt-get install step |"
            echo "| Missing permissions | Add permissions block |"
            echo ""
            echo "---"
            echo ""
            echo "*Generated by Org Brain - Workflow Failure Scanner*"
          } > $OUTPUT_DIR/summary.md

      - name: Commit and push reports
        run: |
          git config user.email "org-brain-bot@github.com"
          git config user.name "Org Brain Bot"

          if git diff --quiet $OUTPUT_DIR/ 2>/dev/null; then
            echo "No changes to commit"
          else
            git add $OUTPUT_DIR/
            git commit -m "chore: update workflow failures report"
            git push
          fi

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        with:
          name: workflow-failures-report
          path: ${{ env.OUTPUT_DIR }}/
          retention-days: 30

      - name: Generate GitHub Summary
        run: |
          {
            echo "# Workflow Failures Scan Complete"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| Total Failures | ${{ steps.aggregate.outputs.total_failures }} |"
            echo "| Repos with Failures | ${{ steps.aggregate.outputs.repos_with_failures }} |"
            echo ""
            echo "## Reports"
            echo "- **JSON:** \`data/workflow-failures/failures.json\`"
            echo "- **Markdown:** \`data/workflow-failures/summary.md\`"
            echo "- **Logs:** \`data/workflow-failures/logs/\`"
          } >> $GITHUB_STEP_SUMMARY
