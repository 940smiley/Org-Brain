# =============================================================================
# ORG PR SWARM MANAGER
# =============================================================================
# Purpose: Centralized PR governance across all repositories
#
# Fixed Issues:
# - Changed /orgs/ to /users/ API endpoint (940smiley is a user account)
# - Fixed matrix.repo to properly parse comma-separated list into JSON array
# - Added proper permissions block
# - Added gh/jq installation
# =============================================================================

name: "🤖 Org PR Swarm Manager"

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub organization name (defaults to current org)"
        required: false
        type: string
      max_repos:
        description: "Maximum repositories to process (0 = unlimited)"
        required: false
        type: number
        default: "0"
      dry_run:
        description: "Run in dry-run mode (no actual changes)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  OWNER: "940smiley"
  ORG_NAME: ${{ github.event.inputs.org || github.repository_owner }}
  MAX_REPOS: ${{ github.event.inputs.max_repos || 0 }}
  DRY_RUN: ${{ github.event.inputs.dry_run || false }}
  COMMIT_EMAIL: "org-brain-bot@github.com"
  COMMIT_NAME: "Org Brain Bot"
  FIX_COMMIT_MESSAGE: "chore: automated repository maintenance"

jobs:
  # ===========================================================================
  # DISCOVER REPOSITORIES
  # ===========================================================================
  discover-repos:
    name: "Discover Organization Repositories"
    runs-on: ubuntu-latest
    outputs:
      repo_list: ${{ steps.get-repos.outputs.repo_list }}
      repo_json: ${{ steps.get-repos.outputs.repo_json }}
      repo_count: ${{ steps.get-repos.outputs.repo_count }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Get all repositories
        id: get-repos
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e
          echo "🔍 Discovering repositories for: $OWNER"

          # Use /users/ endpoint (940smiley is a user, not an org)
          repos_json=$(gh api "/users/$OWNER/repos?per_page=100&type=all" --paginate 2>/dev/null || echo "[]")

          if [ "$repos_json" = "[]" ] || [ -z "$repos_json" ]; then
            echo "⚠️ No repositories found"
            echo "repo_list=[]" >> $GITHUB_OUTPUT
            echo "repo_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Keep JSON compact because $GITHUB_OUTPUT only supports single-line key=value entries.
          active_repos=$(echo "$repos_json" | jq -c '[.[] | select(.archived == false) | .name]')
          repo_count=$(echo "$active_repos" | jq 'length')

          # Also output as comma-separated for compatibility
          repo_list_csv=$(echo "$active_repos" | jq -r 'join(",")')

          echo "📦 Found $repo_count active repositories"
          echo "repo_list=$repo_list_csv" >> $GITHUB_OUTPUT
          echo "repo_json=$active_repos" >> $GITHUB_OUTPUT
          echo "repo_count=$repo_count" >> $GITHUB_OUTPUT

          echo "$active_repos" | jq -r '.[] | "  - \(.)"' | head -20

  # ===========================================================================
  # PROCESS PULL REQUESTS
  # ===========================================================================
  process-prs:
    name: "Process PRs in ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: ${{ needs.discover-repos.outputs.repo_count > 0 && needs.discover-repos.outputs.repo_count != '0' }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        # Convert comma-separated string to JSON array properly
        repo: ${{ fromJson(needs.discover-repos.outputs.repo_json || '[]') }}

    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Process Pull Requests
        id: process-prs
        env:
          GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}
          REPO_NAME: ${{ matrix.repo }}
        run: |
          #!/bin/bash
          set -e

          echo "🔄 Processing repository: $REPO_NAME"

          # Get all open PRs
          prs=$(gh pr list --repo "$OWNER/$REPO_NAME" --state open --limit 100 --json number,title,author,isDraft,updatedAt,labels 2>/dev/null || echo "[]")

          if [ "$prs" = "[]" ]; then
            echo "✅ No open PRs in $REPO_NAME"
            exit 0
          fi

          pr_count=$(echo "$prs" | jq 'length')
          echo "📋 Found $pr_count open PR(s)"

          # Process each PR
          echo "$prs" | jq -c '.[]' | while read -r pr; do
            pr_number=$(echo "$pr" | jq -r '.number')
            pr_title=$(echo "$pr" | jq -r '.title')
            pr_author=$(echo "$pr" | jq -r '.author.login')
            is_draft=$(echo "$pr" | jq -r '.isDraft')
            labels=$(echo "$pr" | jq -r '.labels[].name' | tr '\n' ',')

            echo "📝 PR #$pr_number: $pr_title (Author: $pr_author)"

            # Skip if draft
            [ "$is_draft" = "true" ] && echo "  ⏭️ Skipping: Draft PR" && continue

            # Skip if labeled automation-lock
            echo "$labels" | grep -q "automation-lock" && echo "  ⏭️ Skipping: automation-lock label" && continue

            # Skip if last commit is from a bot
            last_author=$(gh api "/repos/$OWNER/$REPO_NAME/pulls/$pr_number/commits" --jq '.[-1].commit.author.name' 2>/dev/null || echo "")
            if echo "$last_author" | grep -qE "(dependabot|amazon-q|github-actions|llamabot|google-jules).*\[bot\]"; then
              echo "  ⏭️ Skipping: Bot-authored ($last_author)"
              continue
            fi

            echo "  ✅ PR processed"
          done

          echo "📊 Repository $REPO_NAME complete"

  # ===========================================================================
  # AGGREGATE RESULTS
  # ===========================================================================
  aggregate-results:
    name: "Aggregate Results"
    runs-on: ubuntu-latest
    needs: [discover-repos, process-prs]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🧠 Org PR Swarm Manager - Complete

          | Metric | Value |
          |--------|-------|
          | Organization | $OWNER |
          | Repositories | ${{ needs.discover-repos.outputs.repo_count }} |
          | Timestamp | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |

          ✅ Workflow completed
          EOF
