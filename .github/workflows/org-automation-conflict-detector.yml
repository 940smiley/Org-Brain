# =============================================================================
# ORG AUTOMATION CONFLICT DETECTOR
# =============================================================================
# Purpose: Detect when multiple automation bots modify the same PR
#
# Fixed Issues:
# - Changed gh search prs --org to --owner (correct flag for user accounts)
# - Changed /orgs/ to /users/ API endpoint
# - Added proper permissions block
# - Added gh/jq installation
# - Fixed duplicate YAML keys
# - Normalized structure
# =============================================================================

name: "⚠️ Org Automation Conflict Detector"

on:
  schedule:
    - cron: "*/15 * * * *"
  pull_request:
    types: [synchronize, opened, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      org:
        description: "GitHub organization name"
        required: false
        type: string
      pr_number:
        description: "Specific PR number to check (optional)"
        required: false
        type: string
      time_window_minutes:
        description: "Time window for conflict detection (minutes)"
        required: false
        type: number
        default: "10"

permissions:
  contents: write
  pull-requests: write
  actions: read

env:
  OWNER: "940smiley"
  ORG_NAME: ${{ github.event.inputs.org || github.repository_owner }}
  TIME_WINDOW_MINUTES: ${{ github.event.inputs.time_window_minutes || 10 }}
  SPECIFIC_PR: ${{ github.event.inputs.pr_number || '' }}
  GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  # ===========================================================================
  # CHECK SPECIFIC PR
  # ===========================================================================
  check-specific-pr:
    name: "Check Specific PR"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' || github.event.inputs.pr_number != '' }}
    outputs:
      has_conflict: ${{ steps.detect-conflict.outputs.has_conflict }}
      conflict_details: ${{ steps.detect-conflict.outputs.conflict_details }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Detect Automation Conflict
        id: detect-conflict
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        run: |
          set -e
          echo "🔍 Checking for automation conflicts in PR #$PR_NUMBER"

          # Skip if last commit author is a bot
          last_author=$(gh api "/repos/$REPO/pulls/$PR_NUMBER/commits" --jq '.[-1].commit.author.name' 2>/dev/null || echo "")
          if echo "$last_author" | grep -qE "(dependabot|amazon-q|github-actions|llamabot|google-jules).*\[bot\]"; then
            echo "⏭️ Skipping: Last commit author is a bot ($last_author)"
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get commit info
          commit_info=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json commits --jq '.commits[] | {author: .commit.author.name, date: .commit.author.date}' 2>/dev/null || echo "[]")

          if [ "$commit_info" = "[]" ] || [ -z "$commit_info" ]; then
            echo "ℹ️ No commits found"
            echo "has_conflict=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count bot commits within time window
          current_time=$(date +%s)
          window_seconds=$((TIME_WINDOW_MINUTES * 60))

          echo "$commit_info" | jq -r '.[] | "\(.author)|\(.date)"' | while IFS='|' read -r author date; do
            if echo "$author" | grep -q "\[bot\]"; then
              commit_time=$(date -d "$date" +%s 2>/dev/null || echo "0")
              time_diff=$((current_time - commit_time))
              if [ "$time_diff" -lt "$window_seconds" ]; then
                echo "$author" >> /tmp/bot_authors.txt
              fi
            fi
          done

          # Count unique bot authors
          if [ -f /tmp/bot_authors.txt ]; then
            unique_bots=$(sort -u /tmp/bot_authors.txt | wc -l)
          else
            unique_bots=0
          fi

          echo "📊 Bot commits in window: $unique_bots unique authors"

          # Determine conflict
          has_conflict=false
          if [ "$unique_bots" -gt 1 ]; then
            has_conflict=true
            echo "⚠️ CONFLICT: Multiple bot authors detected"
          fi

          echo "has_conflict=$has_conflict" >> $GITHUB_OUTPUT
          echo "conflict_details={\"unique_bots\":$unique_bots}" >> $GITHUB_OUTPUT

      - name: Apply Conflict Labels
        if: ${{ steps.detect-conflict.outputs.has_conflict == 'true' }}
        env:
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.pull_request.number }}
        run: |
          echo "🏷️ Applying conflict labels to PR #$PR_NUMBER"

          current_labels=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json labels --jq '.labels[].name' 2>/dev/null | tr '\n' ',')

          if ! echo "$current_labels" | grep -q "automation-conflict"; then
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "automation-conflict,automation-lock"
            echo "✅ Labels applied"
          else
            echo "ℹ️ Already labeled"
          fi

          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$(cat <<'EOF'
          ⚠️ **Automation Conflict Detected**

          Multiple automation bots detected modifying this PR within a short time window.

          **Actions Taken:**
          - Added \`automation-conflict\` label
          - Added \`automation-lock\` label

          **Next Steps:**
          - Review changes manually
          - Remove \`automation-lock\` when ready to re-enable automation
          EOF
          )"

  # ===========================================================================
  # SCAN ALL ACTIVE PRS
  # ===========================================================================
  scan-all-prs:
    name: "Scan All Active PRs"
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.pr_number == '') }}
    outputs:
      conflicts_found: ${{ steps.scan.outputs.conflicts_found }}
      conflict_prs: ${{ steps.scan.outputs.conflict_prs }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v6

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Scan All Open PRs for Conflicts
        id: scan
        run: |
          set -e
          echo "🔍 Scanning all open PRs in $OWNER for automation conflicts"

          # Use --owner instead of --org (940smiley is a user account)
          all_prs=$(gh search prs --owner "$OWNER" --state open --limit 500 --json number,title,repository,author,updatedAt 2>/dev/null || echo "[]")

          pr_count=$(echo "$all_prs" | jq 'length')
          echo "📋 Found $pr_count open PR(s)"

          conflicts_found=0
          rm -f /tmp/conflict_prs.txt

          # Check each PR
          echo "$all_prs" | jq -c '.[]' | while read -r pr; do
            pr_number=$(echo "$pr" | jq -r '.number')
            repo=$(echo "$pr" | jq -r '.repository.nameWithOwner')

            # Skip if already labeled
            labels=$(gh pr view "$pr_number" --repo "$repo" --json labels --jq '.labels[].name' 2>/dev/null | tr '\n' ',')
            echo "$labels" | grep -q "automation-conflict" && continue

            # Check for bot commits
            commit_info=$(gh pr view "$pr_number" --repo "$repo" --json commits --jq '.commits[] | {author: .commit.author.name, date: .commit.author.date}' 2>/dev/null || echo "[]")

            current_time=$(date +%s)
            window_seconds=$((TIME_WINDOW_MINUTES * 60))

            rm -f /tmp/pr_bot_authors.txt
            echo "$commit_info" | jq -r '.[] | "\(.author)|\(.date)"' 2>/dev/null | while IFS='|' read -r author date; do
              if echo "$author" | grep -q "\[bot\]"; then
                commit_time=$(date -d "$date" +%s 2>/dev/null || echo "0")
                time_diff=$((current_time - commit_time))
                if [ "$time_diff" -lt "$window_seconds" ]; then
                  echo "$author" >> /tmp/pr_bot_authors.txt
                fi
              fi
            done

            if [ -f /tmp/pr_bot_authors.txt ]; then
              unique_bots=$(sort -u /tmp/pr_bot_authors.txt | wc -l)
              if [ "$unique_bots" -gt 1 ]; then
                echo "⚠️ CONFLICT: $repo#$pr_number ($unique_bots bots)"
                echo "$repo:$pr_number" >> /tmp/conflict_prs.txt
              fi
            fi
          done

          # Count conflicts
          if [ -f /tmp/conflict_prs.txt ]; then
            conflicts_found=$(wc -l < /tmp/conflict_prs.txt)
            conflict_prs=$(cat /tmp/conflict_prs.txt | jq -R -s 'split("\n") | map(select(length > 0))')
          else
            conflicts_found=0
            conflict_prs="[]"
          fi

          echo "📊 Scan Complete: $conflicts_found conflicts found"
          echo "conflicts_found=$conflicts_found" >> $GITHUB_OUTPUT
          echo "conflict_prs=$conflict_prs" >> $GITHUB_OUTPUT

  # ===========================================================================
  # RESOLVE CONFLICTS
  # ===========================================================================
  resolve-conflicts:
    name: "Resolve Detected Conflicts"
    runs-on: ubuntu-latest
    needs: scan-all-prs
    if: ${{ needs.scan-all-prs.outputs.conflicts_found > 0 }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        conflict_pr: ${{ fromJson(needs.scan-all-prs.outputs.conflict_prs || '[]') }}
    steps:
      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Apply Conflict Resolution
        env:
          CONFLICT_PR: ${{ matrix.conflict_pr }}
        run: |
          repo=$(echo "$CONFLICT_PR" | cut -d: -f1)
          pr_number=$(echo "$CONFLICT_PR" | cut -d: -f2)

          echo "🔧 Resolving conflict for $repo#$pr_number"

          current_labels=$(gh pr view "$pr_number" --repo "$repo" --json labels --jq '.labels[].name' 2>/dev/null | tr '\n' ',')

          if ! echo "$current_labels" | grep -q "automation-conflict"; then
            gh pr edit "$pr_number" --repo "$repo" --add-label "automation-conflict,automation-lock"
          fi

          gh pr comment "$pr_number" --repo "$repo" --body "$(cat <<EOF
          ⚠️ **Automation Conflict Detected**

          Multiple automation bots detected within a $TIME_WINDOW_MINUTES minute window.

          **Actions:**
          - Added \`automation-conflict\` label
          - Added \`automation-lock\` label

          Remove \`automation-lock\` to re-enable automation.
          EOF
          )"

  # ===========================================================================
  # GENERATE REPORT
  # ===========================================================================
  conflict-report:
    name: "Generate Conflict Report"
    runs-on: ubuntu-latest
    needs: [check-specific-pr, scan-all-prs, resolve-conflicts]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          conflicts="${{ needs.scan-all-prs.outputs.conflicts_found || 0 }}"
          status=$([ "$conflicts" -gt 0 ] && echo "⚠️ Conflicts detected" || echo "✅ No conflicts")

          cat <<EOF >> "$GITHUB_STEP_SUMMARY"
          # ⚠️ Automation Conflict Detection Report

          | Metric | Value |
          |--------|-------|
          | Organization | $OWNER |
          | Time Window | $TIME_WINDOW_MINUTES minutes |
          | Conflicts Found | $conflicts |
          | Status | $status |

          ## Resolution

          Conflicts are automatically labeled with:
          - \`automation-conflict\`
          - \`automation-lock\`
          EOF

