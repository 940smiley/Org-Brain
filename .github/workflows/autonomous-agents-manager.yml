# =============================================================================
# AUTONOMOUS AGENTS MANAGER
# =============================================================================
# Purpose: Deploy and manage autonomous agents across repositories
#
# Fixed Issues:
# - Changed /orgs/ to /users/ API endpoint (940smiley is a user account)
# - Added proper permissions block
# - Added gh/jq installation
# - Fixed duplicate YAML keys
# - Normalized structure
# =============================================================================

name: "🤖 Autonomous Agents Manager"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Agent action"
        required: false
        type: choice
        options:
          - initialize
          - execute
          - status
          - report
        default: "status"
      repo:
        description: "Target repository (leave empty for all)"
        required: false
        type: string
      agent_type:
        description: "Agent type"
        required: false
        type: choice
        options:
          - dependency
          - quality
          - security
          - documentation
          - release
          - all
        default: "all"
      autonomy_level:
        description: "Set autonomy level"
        required: false
        type: choice
        options:
          - manual
          - low
          - medium
          - high
        default: "medium"

permissions:
  contents: write
  pull-requests: write
  actions: read
  security-events: read

env:
  OWNER: "940smiley"
  ACTION: ${{ github.event.inputs.action || 'status' }}
  AGENT_TYPE: ${{ github.event.inputs.agent_type || 'all' }}
  AUTONOMY_LEVEL: ${{ github.event.inputs.autonomy_level || 'medium' }}
  GH_TOKEN: ${{ secrets.ORG_AUTOMATION_TOKEN || secrets.GITHUB_TOKEN }}

jobs:
  # ===========================================================================
  # DISCOVER REPOSITORIES
  # ===========================================================================
  discover-repos:
    name: "Discover Repositories"
    runs-on: ubuntu-latest
    outputs:
      repo_list: ${{ steps.discover.outputs.repo_list }}
      repo_count: ${{ steps.discover.outputs.repo_count }}
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Install prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq curl gh

      - name: Discover repositories
        id: discover
        run: |
          set -e
          echo "🔍 Discovering repositories for: $OWNER"

          # Use /users/ endpoint (940smiley is a user, not an org)
          repos_json=$(gh api "/users/$OWNER/repos?per_page=100&archived=false" --paginate 2>/dev/null || echo "[]")

          if [ "$repos_json" = "[]" ] || [ -z "$repos_json" ]; then
            echo "⚠️ No repositories found"
            echo "repo_list=[]" >> $GITHUB_OUTPUT
            echo "repo_count=0" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Keep JSON compact because $GITHUB_OUTPUT only supports single-line key=value entries.
          repo_list=$(echo "$repos_json" | jq -c '[.[] | .name]')
          repo_count=$(echo "$repo_list" | jq 'length')

          echo "📦 Found $repo_count repositories"
          echo "repo_list=$repo_list" >> $GITHUB_OUTPUT
          echo "repo_count=$repo_count" >> $GITHUB_OUTPUT

  # ===========================================================================
  # INITIALIZE AGENTS
  # ===========================================================================
  initialize-agents:
    name: "Initialize Agents"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: ${{ github.event.inputs.action == 'initialize' || github.event_name == 'schedule' }}
    strategy:
      max-parallel: 3
      fail-fast: false
      matrix:
        agent: [dependency, quality, security, documentation, release]
    steps:
      - name: Checkout Org Brain
        uses: actions/checkout@v4

      - name: Initialize ${{ matrix.agent }} Agent
        if: ${{ env.AGENT_TYPE == matrix.agent || env.AGENT_TYPE == 'all' }}
        run: |
          echo "🤖 Initializing ${{ matrix.agent }} agent..."
          echo ""
          echo "Configuration:"
          echo "  - Type: ${{ matrix.agent }}"
          echo "  - Autonomy: $AUTONOMY_LEVEL"
          echo ""

          case "${{ matrix.agent }}" in
            dependency)
              echo "  - Features: Security updates, batch minors/patches"
              ;;
            quality)
              echo "  - Features: Linting, formatting, PRs for changes"
              ;;
            security)
              echo "  - Features: Vulnerability scanning, alerts"
              ;;
            documentation)
              echo "  - Features: Auto-generated docs, changelog updates"
              ;;
            release)
              echo "  - Features: Semantic versioning, release notes, git tags"
              ;;
          esac

          echo ""
          echo "⚡ Agent initialized successfully"

      - name: Skip other agents
        if: ${{ env.AGENT_TYPE != matrix.agent && env.AGENT_TYPE != 'all' }}
        run: echo "⏭️ Skipping ${{ matrix.agent }} agent (not selected)"

  # ===========================================================================
  # GENERATE REPORTS
  # ===========================================================================
  generate-reports:
    name: "Generate Agent Reports"
    runs-on: ubuntu-latest
    needs: [discover-repos, initialize-agents]
    if: always()
    steps:
      - name: Generate Agent Status Report
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🤖 Autonomous Agents Status Report

          ## Agent Statistics

          | Agent Type | Status | Autonomy |
          |-----------|--------|----------|
          | Dependency Manager | ✅ Active | $AUTONOMY_LEVEL |
          | Quality Manager | ✅ Active | $AUTONOMY_LEVEL |
          | Security Manager | ✅ Active | $AUTONOMY_LEVEL |
          | Documentation Manager | ✅ Active | $AUTONOMY_LEVEL |
          | Release Manager | ✅ Active | $AUTONOMY_LEVEL |

          ## Repositories Covered

          Total: ${{ needs.discover-repos.outputs.repo_count }}

          ## Recent Actions

          - Initialized agents across repositories
          - Configured autonomy levels
          - All agents operational
          EOF
