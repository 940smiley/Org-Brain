name: "🤖 Autonomous Agents Manager"

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      action:
        description: "Agent action"
        required: false
        type: choice
        options:
          - initialize
          - status
          - report
        default: "status"
      agent_type:
        description: "Agent type"
        required: false
        type: choice
        options:
          - dependency
          - quality
          - security
          - documentation
          - release
          - all
        default: "all"
      autonomy:
        description: "Autonomy level"
        required: false
        type: choice
        options:
          - manual
          - low
          - medium
          - high
        default: "medium"

permissions:
  contents: write
  pull-requests: write

env:
  ORG_NAME: ${{ github.repository_owner }}
  ACTION: ${{ github.event.inputs.action || 'status' }}
  AGENT_TYPE: ${{ github.event.inputs.agent_type || 'all' }}
  AUTONOMY: ${{ github.event.inputs.autonomy || 'medium' }}
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  discover-repos:
    name: "Discover Repositories"
    runs-on: ubuntu-latest
    outputs:
      repos: ${{ steps.discover.outputs.repos }}
      count: ${{ steps.discover.outputs.count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Discover active repositories
        id: discover
        run: |
          echo "🔍 Discovering active repositories..."

          # Get all active repositories
          repos_json=$(gh api "/orgs/$ORG_NAME/repos?per_page=100&type=public" \
            --jq '[.[] | select(.archived == false and .fork == false) | .name]')

          # Build matrix-compatible output
          matrix_repos="[]"
          count=0

          while IFS= read -r repo_name; do
            matrix_repos=$(echo "$matrix_repos" | jq --arg repo "$repo_name" '. += [{"repo": $repo}]')
            count=$((count + 1))
          done < <(echo "$repos_json" | jq -r '.[]')

          echo "Found $count repositories"
          echo "repos=$(echo "$matrix_repos" | jq -c '.')" >> "$GITHUB_OUTPUT"
          echo "count=$count" >> "$GITHUB_OUTPUT"

  initialize:
    name: "Initialize ${{ matrix.repo }}"
    runs-on: ubuntu-latest
    needs: discover-repos
    if: ${{ needs.discover-repos.outputs.count > 0 && github.event.inputs.action == 'initialize' }}
    strategy:
      max-parallel: 5
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.discover-repos.outputs.repos) }}

    steps:
      - name: Validate repo
        run: |
          echo "Processing: ${{ matrix.repo }}"
          if [[ ! "${{ matrix.repo }}" =~ ^[a-zA-Z0-9_-]+$ ]]; then
            echo "❌ Invalid repo name"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ matrix.repo }}
          token: ${{ env.GH_TOKEN }}
          fetch-depth: 1

      - name: Initialize ${{ env.AGENT_TYPE }} Agents
        run: |
          REPO="${{ matrix.repo }}"
          ORG="${{ github.repository_owner }}"

          echo "🤖 Initializing agents for $REPO"
          echo "   Type: $AGENT_TYPE"
          echo "   Autonomy: $AUTONOMY"

          # Create agent configuration directory
          mkdir -p .org-brain/agents

          if [[ "$AGENT_TYPE" == "dependency" ]] || [[ "$AGENT_TYPE" == "all" ]]; then
            echo "📦 Dependency Manager"
            cat > .org-brain/agents/dependency-manager.json <<EOF
          {
            "type": "dependencyManager",
            "enabled": true,
            "autonomyLevel": "$AUTONOMY",
            "features": {
              "securityUpdates": true,
              "batchMinorPatch": true,
              "autoMerge": false
            }
          }
          EOF
          fi

          if [[ "$AGENT_TYPE" == "quality" ]] || [[ "$AGENT_TYPE" == "all" ]]; then
            echo "🔍 Quality Manager"
            cat > .org-brain/agents/quality-manager.json <<EOF
          {
            "type": "qualityManager",
            "enabled": true,
            "autonomyLevel": "$AUTONOMY",
            "features": {
              "autoFormat": true,
              "autoLint": true,
              "generateReports": true
            }
          }
          EOF
          fi

          if [[ "$AGENT_TYPE" == "security" ]] || [[ "$AGENT_TYPE" == "all" ]]; then
            echo "🔒 Security Manager"
            cat > .org-brain/agents/security-manager.json <<EOF
          {
            "type": "securityManager",
            "enabled": true,
            "autonomyLevel": "$AUTONOMY",
            "features": {
              "scanDependencies": true,
              "detectSecrets": true,
              "generateAlerts": true
            }
          }
          EOF
          fi

          if [[ "$AGENT_TYPE" == "documentation" ]] || [[ "$AGENT_TYPE" == "all" ]]; then
            echo "📚 Documentation Manager"
            cat > .org-brain/agents/documentation-manager.json <<EOF
          {
            "type": "documentationManager",
            "enabled": true,
            "autonomyLevel": "$AUTONOMY",
            "features": {
              "generateDocs": true,
              "updateChangelog": true,
              "maintainREADME": true
            }
          }
          EOF
          fi

          echo "✅ Agents initialized"

      - name: Commit Changes
        run: |
          cd /tmp && git clone https://github.com/${{ github.repository_owner }}/${{ matrix.repo }}.git --depth 1
          cd ${{ matrix.repo }}

          # Copy agent configs
          mkdir -p .org-brain/agents
          cp /tmp/agent-configs/* .org-brain/agents/ 2>/dev/null || true

          # Configure git
          git config user.name "Org Brain Bot"
          git config user.email "org-brain@github.com"

          # Commit if changes exist
          if ! git diff --quiet; then
            git add .org-brain/
            git commit -m "chore: initialize org-brain autonomous agents"
            git push https://x-access-token:${{ env.GH_TOKEN }}@github.com/${{ github.repository_owner }}/${{ matrix.repo }}.git
            echo "✅ Changes committed"
          else
            echo "ℹ️ No changes to commit"
          fi

  report:
    name: "Generate Report"
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Summary
        run: |
          {
            echo "## 🤖 Autonomous Agents Workflow"
            echo ""
            echo "### Configuration"
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Action | $ACTION |"
            echo "| Agent Type | $AGENT_TYPE |"
            echo "| Autonomy Level | $AUTONOMY |"
            echo ""
            echo "### Status"
            echo "✅ Workflow completed successfully"
            echo ""
            echo "### Agent Types Configured"
            if [[ "$AGENT_TYPE" == "all" ]] || [[ "$AGENT_TYPE" == "dependency" ]]; then
              echo "- 📦 **DependencyManager**: Manages library updates"
            fi
            if [[ "$AGENT_TYPE" == "all" ]] || [[ "$AGENT_TYPE" == "quality" ]]; then
              echo "- 🔍 **QualityManager**: Code quality enforcement"
            fi
            if [[ "$AGENT_TYPE" == "all" ]] || [[ "$AGENT_TYPE" == "security" ]]; then
              echo "- 🔒 **SecurityManager**: Vulnerability management"
            fi
            if [[ "$AGENT_TYPE" == "all" ]] || [[ "$AGENT_TYPE" == "documentation" ]]; then
              echo "- 📚 **DocumentationManager**: Documentation automation"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
